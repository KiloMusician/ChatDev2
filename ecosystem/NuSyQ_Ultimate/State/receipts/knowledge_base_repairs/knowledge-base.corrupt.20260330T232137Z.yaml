learnings:
  technical:
  - "OmniTag metadata enables semantic file discovery - fractal CONTEXT levels (\u03A3\
    \u221E/\u03A30/\u03A31/\u03A32/\u03A33/\u03A3\u2206) map files to system hierarchy"
  - Universal tagging with FILE-ID, TAGS, AGENTS fields allows AI agents to auto-discover
    compatible files
  - Documentation organization is crucial for long-term maintainability - docs/ structure
    with categories prevents clutter
  - Continue.dev requires explicit model configuration in ~/.continue/config.ts -
    empty config means no models available
  - Manifest validation is crucial
  - Error handling prevents silent failures
  - Ollama model names must be exact
  - Winget packages may not always be available
  - Pip packages need verification
  - ChatDev requires OpenAI API or compatible proxy for Ollama integration
  - GitHub Copilot does not support custom backends - use Continue.dev for Ollama
  - "\u039ENuSyQ symbolic framework enables advanced message tracking and coordination"
  - OmniTag encoding provides rich context compression for AI workflows
  - Fractal coordination patterns enable multi-model consensus mechanisms
  - "Temporal drift tracking (\u2A08\u03A6\u03A3\u039E\u03A8\u0398\u03A3\u039B) provides\
    \ AI performance analysis"
  - Always specify encoding='utf-8' when opening files for cross-platform compatibility
  - Use lazy % formatting in logging functions for performance
  - Catch specific exceptions rather than broad Exception for better error handling
  - Add check=False or check=True explicitly to subprocess.run() calls
  - Type hints improve IDE support and enable static analysis with mypy
  - Continue.dev supports multiple Ollama models with role-based assignment (default,
    edit, chat, summarize)
  - OpenAI API should be configured as fallback only, not primary, for cost efficiency
  - Store all API keys and tokens in .env.secrets with proper gitignore protection
  - 'VS Code extension priority: Continue.dev (Ollama) > Claude Code (Anthropic) >
    GitHub Copilot (disabled by default)'
  - 'CRITICAL: ''Simple'' means SIMPLE - don''t build frameworks for one-off tasks'
  - 'Theatre detection: If docs > work by 10x, it''s sophisticated theatre (bloat)'
  - 'One-off vs Recurring: DO IT manually vs BUILD SYSTEM (this determines approach)'
  operational:
  - Structured YAML configs are more maintainable than markdown
  - Modular architecture enables easier updates
  - Automated validation prevents configuration drift
  - Archive folder contains valuable symbolic framework concepts for integration
  - Comprehensive documentation guides improve usability and onboarding
  - "Multi-AI orchestration benefits from symbolic message protocol [Msg\u26DB{X}\u2197\
    \uFE0F\u03A3\u221E]"
  - 'For simple tasks: execute directly, don''t create infrastructure first'
  - User says 'simple' = literal instruction, not invitation to build systems
