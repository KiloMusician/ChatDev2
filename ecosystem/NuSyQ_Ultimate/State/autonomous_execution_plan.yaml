# === SELF-HEALING STRATEGIES ===
self_healing:
  import_errors:
    strategy: "Use ChatDev to generate missing modules or fix import paths"
    fallback: "Create stub implementations"

  type_errors:
    strategy: "Add type hints incrementally, use mypy --no-strict-optional"
    fallback: "Add # type: ignore comments strategically"

  test_failures:
    strategy: "Analyze root cause, use ChatDev to generate fixes, apply proof gates"
    fallback: "Skip flaky tests, document for human review"

  dependency_conflicts:
    strategy: "Create virtual environment isolation, version pinning"
    fallback: "Use compatibility layers"

