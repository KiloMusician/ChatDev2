# Pre-commit hooks for NuSyQ quality enforcement
# Install: pre-commit install
# Run manually: pre-commit run --all-files
# cSpell:ignore mypy rsev omnitag

repos:
  # Built-in formatters and checks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
        exclude: '^knowledge-base\.yaml$'  # file mixes YAML + markdown sections (pre-existing format)
      - id: check-json
      - id: check-added-large-files
        args: ['--maxkb=5000']
      - id: check-merge-conflict
      - id: mixed-line-ending
        args: ['--fix=lf']

  # Python code quality
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.9.2
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
      - id: ruff-format

  # Type checking (optional - can be slow)
  # - repo: https://github.com/pre-commit/mirrors-mypy
  #   rev: v1.14.1
  #   hooks:
  #     - id: mypy
  #       additional_dependencies: [types-all]

  # NuSyQ-specific validators (local hooks)
  - repo: local
    hooks:
      - id: rsev-normalize-check
        name: RosettaStone Normalization Validator
        entry: python scripts/pre_commit_rsev.py
        language: system
        pass_filenames: false
        always_run: true

      - id: omnitag-schema-check
        name: OmniTag Event Schema Validator
        entry: python scripts/pre_commit_omnitag.py
        language: system
        files: '^(src|mcp_server|config)/.*\.py$'
        pass_filenames: true

      - id: pytest-fast
        name: Fast Unit Tests (no MCP/Ollama)
        entry: python -m pytest tests/test_proof_gates.py tests/test_flexibility_manager.py tests/test_rosetta_pipeline.py tests/test_tracing.py tests/test_tracing_setup.py tests/test_evaluation_runner.py --tb=short --timeout=30
        language: system
        pass_filenames: false
        stages: [commit]
