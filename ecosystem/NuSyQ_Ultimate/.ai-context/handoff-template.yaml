# Claude Code Handoff Package
# Generated by: GitHub Copilot
# Date: {timestamp}
# Session ID: {session_id}


objective:
  primary_goal: "{user_request_summary}"
  scope: "{scope_description}"
  priority: "{critical|high|normal|low}"

copilot_investigation:
  summary: |
    {what_copilot_discovered}

  token_usage:
    current: {tokens_used}
    remaining: {tokens_available}
    reason_for_handoff: "{why_handing_off}"

  complexity_analysis:
    files_affected: {count}
    estimated_cognitive_complexity: {value}
    architectural_impact: "{none|low|medium|high}"

file_inventory:
  primary_files:
    - path: "{file_path}"
      purpose: "{what_needs_to_change}"
      current_state: "{current_status}"
      required_changes: "{change_description}"
      dependencies: ["{file1}", "{file2}"]

  related_files:
    - path: "{related_file_path}"
      relationship: "{how_it_relates}"
      may_need_update: {true|false}

investigation_findings:
  errors_found:
    - location: "{file:line}"
      type: "{error_type}"
      severity: "{critical|high|medium|low}"
      description: "{what_is_wrong}"
      proposed_fix: "{how_to_fix}"

  patterns_identified:
    - pattern: "{pattern_name}"
      occurrences: {count}
      recommendation: "{what_to_do}"

  opportunities:
    - type: "{refactoring|optimization|enhancement}"
      description: "{what_could_be_improved}"
      benefit: "{why_do_it}"

constraints:
  must_preserve:
    - "{functionality_to_keep}"
    - "{compatibility_requirement}"

  must_avoid:
    - "{anti_pattern_to_avoid}"
    - "{breaking_change_to_avoid}"

  should_consider:
    - "{best_practice}"
    - "{architectural_principle}"

recommended_approach:
  strategy: "{high_level_strategy}"

  steps:
    - step: 1
      action: "{what_to_do_first}"
      rationale: "{why_start_here}"

    - step: 2
      action: "{what_to_do_next}"
      rationale: "{why_this_order}"

  alternative_approaches:
    - approach: "{alternative_strategy}"
      pros: ["{benefit1}", "{benefit2}"]
      cons: ["{drawback1}", "{drawback2}"]

context_files:
  # Files to review for context
  - path: "{context_file}"
    relevance: "{why_review_this}"
    key_points: ["{point1}", "{point2}"]

success_criteria:
  verification_steps:
    - check: "{what_to_verify}"
      method: "{how_to_verify}"
      expected_result: "{what_success_looks_like}"

  test_coverage:
    - test: "{test_to_run}"
      should_pass: {true|false}

  quality_gates:
    - metric: "{metric_name}"
      threshold: "{acceptable_value}"

copilot_follow_up:
  will_handle:
    - "{task_copilot_will_do_after}"
    - "{validation_copilot_will_run}"

  waiting_for:
    - "{what_copilot_needs_from_claude}"

  handback_trigger:
    condition: "{when_to_hand_back}"
    next_action: "{what_copilot_does_next}"

metadata:
  generated_by: "GitHub Copilot"
  session_token_usage: {tokens_used}
  investigation_duration: "{time_spent}"
  confidence_level: "{high|medium|low}"
  requires_council_review: {true|false}

notes:
  - "{additional_context}"
  - "{special_considerations}"
  - "{user_preferences}"
