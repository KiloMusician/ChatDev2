# ΞNuSyQ Agent Registry
# Comprehensive catalog of all AI agents in the ecosystem
# Version: 1.0.0
# Updated: 2025-10-07

agents:
  # === ORCHESTRATOR AGENTS ===

  claude_code:
    type: "orchestrator"
    provider: "Anthropic"
    model: "claude-sonnet-4.5"
    capabilities:
      - "file_read"
      - "file_write"
      - "file_edit"
      - "bash_execution"
      - "web_search"
      - "agent_coordination"
      - "workflow_management"
      - "strategic_planning"
    cost_per_1k_tokens:
      input: 0.003
      output: 0.015
    context_window: 200000
    availability: "always"
    reliability: "high"
    strengths:
      - "Complex problem decomposition"
      - "Multi-agent coordination"
      - "Code quality and architecture"
      - "Documentation generation"
    weaknesses:
      - "API costs for high-volume tasks"
      - "Rate limits on concurrent requests"
    use_cases:
      - "Strategic planning and architecture"
      - "Code review and refactoring"
      - "Complex debugging"
      - "Multi-agent workflow orchestration"
      - "Documentation synthesis"

  github_copilot:
    type: "assistant"
    provider: "GitHub"
    model: "gpt-4o"
    capabilities:
      - "inline_completion"
      - "code_suggestion"
      - "chat_assistance"
      - "documentation_help"
    cost_per_month: 10.0  # Fixed subscription
    context_window: 128000
    availability: "always"
    reliability: "high"
    strengths:
      - "Real-time inline suggestions"
      - "IDE integration"
      - "Fast completion"
    weaknesses:
      - "Limited to coding tasks"
      - "No file operations"
    use_cases:
      - "Real-time code completion"
      - "Quick coding assistance"
      - "Documentation snippets"

  # === OLLAMA LOCAL MODELS (Free, Offline) ===

  ollama_qwen_7b:
    type: "executor"
    provider: "Ollama (Local)"
    model: "qwen2.5-coder:7b"
    capabilities:
      - "code_generation"
      - "docstring_creation"
      - "simple_refactoring"
      - "bug_fixing"
    cost_per_1k_tokens: 0.0  # Free/local
    context_window: 32768
    availability: "always"
    reliability: "high"
    strengths:
      - "Fast inference (local)"
      - "Free unlimited usage"
      - "Good for simple tasks"
      - "Python and JavaScript focus"
    weaknesses:
      - "Less capable than 14b variant"
      - "Struggles with complex logic"
    use_cases:
      - "Docstring generation"
      - "Simple code completion"
      - "Quick refactoring"
      - "Comment generation"

  ollama_qwen_14b:
    type: "executor"
    provider: "Ollama (Local)"
    model: "qwen2.5-coder:14b"
    capabilities:
      - "complex_code_generation"
      - "architecture_design"
      - "advanced_refactoring"
      - "algorithm_implementation"
    cost_per_1k_tokens: 0.0
    context_window: 32768
    availability: "always"
    reliability: "high"
    strengths:
      - "High code quality"
      - "Complex problem solving"
      - "Multi-language support"
      - "Excellent for architecture"
    weaknesses:
      - "Slower than 7b (larger model)"
      - "Higher memory usage"
    use_cases:
      - "Complex feature implementation"
      - "System architecture design"
      - "Advanced refactoring"
      - "Performance optimization"

  ollama_gemma_9b:
    type: "reasoner"
    provider: "Ollama (Local)"
    model: "gemma2:9b"
    capabilities:
      - "logical_reasoning"
      - "decision_making"
      - "strategic_analysis"
      - "consensus_building"
    cost_per_1k_tokens: 0.0
    context_window: 8192
    availability: "always"
    reliability: "high"
    strengths:
      - "Strong reasoning capabilities"
      - "Good for architecture decisions"
      - "Multi-perspective analysis"
    weaknesses:
      - "Smaller context window"
      - "Less code-focused than Qwen"
    use_cases:
      - "Architecture decisions"
      - "Security analysis"
      - "Multi-model consensus"
      - "Strategic planning"

  ollama_codellama_7b:
    type: "executor"
    provider: "Ollama (Local)"
    model: "codellama:7b"
    capabilities:
