  ollama_llama_8b:
    type: "assistant"
    provider: "Ollama (Local)"
    model: "llama3.1:8b"
    capabilities:
      - "general_assistance"
      - "documentation"
      - "conversation"
    cost_per_1k_tokens: 0.0
    context_window: 128000
    availability: "always"
    reliability: "high"
