# === ROUTING PREFERENCES ===

routing_preferences:
  # Task type → Preferred agent
  simple_docstring: "ollama_qwen_7b"
  complex_code: "ollama_qwen_14b"
  architecture_decision: "multi_model_consensus"  # gemma + qwen + claude
  security_audit: "multi_model_consensus"  # gemma + qwen + claude
  full_feature: "chatdev_ceo"
  refactoring: "ollama_qwen_14b"
  bug_fix_simple: "ollama_qwen_7b"
  bug_fix_complex: "ollama_qwen_14b"
  documentation: "ollama_llama_8b"
  test_generation: "chatdev_tester"
  code_review: "chatdev_reviewer"
  codebase_search: "continue_dev"

# === COST OPTIMIZATION RULES ===

cost_optimization:
  prefer_free: true  # Always try Ollama first
  api_threshold: "complex_or_critical"  # Only use paid APIs for complex/critical tasks
  multi_model_threshold: "critical_only"  # Only multi-model consensus for critical decisions

  cost_breakdown:
    free_agents: ["ollama_*", "chatdev_*", "continue_dev"]
    paid_agents: ["claude_code", "github_copilot"]

  estimated_monthly_savings: 880  # USD/month using Ollama vs all API calls

# === AGENT COORDINATION PATTERNS ===

coordination_patterns:
  simple_task:
    flow: "claude_code → ollama_qwen_7b → verify"
    use_case: "Docstrings, simple refactoring"

  complex_task:
    flow: "claude_code → ollama_qwen_14b → claude_code review"
    use_case: "Feature implementation, architecture"

  critical_decision:
    flow: "claude_code → [qwen_14b, gemma_9b, codellama_7b] → claude_code synthesis"
    use_case: "Security, architecture, breaking changes"

  full_project:
    flow: "claude_code → chatdev_ceo → chatdev_agents → claude_code integration"
    use_case: "New features, multi-file systems"

  interactive_dev:
    flow: "continue_dev ↔ user ↔ ollama_models"
    use_case: "Real-time development, exploration"

# === AVAILABILITY MONITORING ===

health_checks:
  ollama_required: true
  chatdev_required: false  # Optional enhancement
  continue_dev_required: false  # Optional enhancement

  startup_verification:
    - "Check Ollama running (ollama list)"
    - "Verify 7 models pulled"
    - "Test simple query to qwen:7b"
    - "Optionally test ChatDev"
