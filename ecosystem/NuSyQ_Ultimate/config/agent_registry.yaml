      - "code_completion"
      - "bug_fixing"
    cost_per_1k_tokens: 0.0
    context_window: 16384
    availability: "always"
    reliability: "medium"
    strengths:
      - "Fast code generation"
      - "Good for simple tasks"
    weaknesses:
      - "Older model (2023)"
      - "Less capable than Qwen"
    use_cases:
      - "Legacy code maintenance"
      - "Simple completion tasks"
