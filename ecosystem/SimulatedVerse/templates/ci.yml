name: CI
on:
  push: { branches: [ main ] }
  pull_request: {}
jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 18, cache: 'pnpm' }
      - run: npm i -g pnpm@9
      - run: pnpm i
      - run: pnpm lint
      - run: pnpm test
      - run: pnpm build