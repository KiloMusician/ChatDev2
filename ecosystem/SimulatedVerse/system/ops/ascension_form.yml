      - id: "AF-044"
        level: "critical"
        title: "Pause truly pauses"
        intent: "Deterministic sim."
        pass: "No timers continue while paused."

      - id: "AF-045"
        level: "critical"
        title: "Offline idle calculation"
        intent: "Fair rewards."
        pass: "Δt cap; diminishing returns; anti-exploit clamps."

      - id: "AF-046"
        level: "major"
        title: "Tower path clarity"
        intent: "Factorio/mindustry readability."
        pass: "Path preview + DPS/coverage ASCII viz."

      - id: "AF-047"
        level: "major"
        title: "Rogue seeds reproducible"
        intent: "Debug & share runs."
        pass: "Seed visible; copy/share button."

      - id: "AF-048"
        level: "minor"
        title: "Base blueprinting"
        intent: "Place ghost plans first."
        pass: "Cost preview; cancels with refund rules."

  - name: "Systems & Economy"
