        intent: "Trust & tuning."
        pass: "Shown as ranges; pity/ceiling documented."

      - id: "AF-052"
        level: "minor"
        title: "Prestige visibility"
        intent: "Long-term goals."
        pass: "Projected gains preview."

  - name: "Lore, Narrative, Knife-Missile I/O"
    id: "C13"
    checks:
      - id: "AF-053"
        level: "major"
        title: "Knife-missile command grammar"
        intent: "Natural-language micro-scripts."
        pass: "Local parser; no external tokens in dev mode."

      - id: "AF-054"
        level: "major"
        title: "Content safety & tone"
        intent: "Respectful Culture ethos."
        pass: "Profanity filters optional; consent prompts."

      - id: "AF-055"
        level: "minor"
        title: "Diegetic tutorials"
        intent: "No walls of text."
        pass: "Tooltips + quests + skippable sims."

      - id: "AF-056"
        level: "minor"
        title: "Lore codex searchable"
        intent: "Obsidian sync."
        pass: "Full-text search; tags/OmniTag supported."

  - name: "Telemetry & Debugging"
    id: "C14"
    checks:
      - id: "AF-057"
        level: "critical"
        title: "Crash capture with breadcrumb"
        intent: "Fix fast."
        pass: "Stack + last 20 events stored locally."

      - id: "AF-058"
        level: "major"
        title: "Dev HUD toggle"
        intent: "Perf, logs, state inspector."
        pass: "Overlay shows fps, heap, actions/sec."

      - id: "AF-059"
        level: "major"
        title: "Error copy-to-clipboard"
        intent: "Shareable bug reports."
        pass: "One-tap copy JSON diagnostic."

      - id: "AF-060"
        level: "minor"
        title: "Replay-last-30s"
        intent: "Input/state repro."
        pass: "Stores deterministic seed + inputs window."

  - name: "Build, Assets, Size"
    id: "C15"
    checks:
      - id: "AF-061"
        level: "critical"
        title: "Bundle under target"
        intent: "Mobile networks."
        pass: "<= 2.5MB initial; lazy beyond."

      - id: "AF-062"
        level: "major"
        title: "Fonts subsetted"
        intent: "ASCII/Unicode needed only."
        pass: "WOFF2 subsets per language block."

      - id: "AF-063"
        level: "major"
        title: "Images/vector balance"
        intent: "Favor procedural/ASCII."
        pass: "No uncompressed PNGs > 200KB."

      - id: "AF-064"
        level: "minor"
        title: "Codegen cache"
        intent: "Replit speed."
        pass: "tsbuildinfo, vite/webpack cache mounted."

  - name: "Network & Costs"
    id: "C16"
    checks:
      - id: "AF-065"
        level: "critical"
        title: "Zero-token dev mode"
        intent: "No paid API hits in dev."
        pass: "All LLM routes stubbed to Ollama/local."

      - id: "AF-066"
        level: "major"
        title: "Backoff + jitter"
        intent: "Resilience/cost."
        pass: "Exponential; max cap 60s; cancelable."

      - id: "AF-067"
        level: "major"
        title: "Batching events"
        intent: "Fewer requests."
        pass: "Telemetry/events flushed every 5s or 10 items."

      - id: "AF-068"
        level: "minor"
        title: "Compression"
        intent: "Bandwidth."
        pass: "gzip/brotli; JSON trimmed; NDJSON where apt."

  - name: "Security & Data"
    id: "C17"
    checks:
      - id: "AF-069"
        level: "critical"
        title: "Secrets never in client"
        intent: "Protect credentials."
        pass: "Only server-side tokens; mobile uses scoped keys."

      - id: "AF-070"
        level: "critical"
        title: "Permission gating"
        intent: "Principle of least privilege."
        pass: "RBAC for dangerous actions."

      - id: "AF-071"
        level: "major"
        title: "Save encryption at rest"
        intent: "Player trust."
        pass: "Local AES; key derivation from device salt."

      - id: "AF-072"
        level: "minor"
        title: "PII minimization"
        intent: "Privacy by design."
        pass: "No unnecessary personal data stored."

  - name: "Testing & QA on Device"
    id: "C18"
