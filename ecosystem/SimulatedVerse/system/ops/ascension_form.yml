# ops/ascension_form.yml
meta:
  codename: "ΞNuSyQ Ascension Form"
  version: 1
  purpose: "Mobile-first stabilization + polish pass for complex game/app on Replit"
  ethic: "Respectful, life-preserving, accessibility-first, Culture-aligned"
  scoring:
    method: "sum_passes_weighted"
    pass_threshold: 96           # tune to your quality bar
    weights:
      critical: 3
      major: 2
      minor: 1
  hooks:
    precheck: ["npm run typecheck", "npm run lint"]
    run: ["npm run dev"]
    build: ["npm run build"]
    measure: ["node ops/mobile_metrics.cjs --json out/metrics.json"]
  output:
    report: "out/ascension_report.json"
    artifacts: ["out/metrics.json", "out/screens.zip"]

categories:
  - name: "Boot & Startup"
    id: "C1"
    checks:
      - id: "AF-001"
        level: "critical"
        title: "Cold start under 3s (mid device)"
        intent: "Avoid user bounce; fast first paint."
        pass: "TTI ≤ 3000ms on 6x CPU throttle, slow 4G simulated."

      - id: "AF-002"
        level: "critical"
        title: "No blocking permissions on first launch"
        intent: "Defer prompts until user intent is clear."
        pass: "No camera/storage/location prompts before action."

      - id: "AF-003"
        level: "major"
        title: "Boot sequence resilient"
        intent: "Recover from missing network/config."
        pass: "Splash shows offline-safe path + retry with backoff."

      - id: "AF-004"
        level: "major"
        title: "Delta-hydration / skeletons"
        intent: "Perceived speed; no layout jank."
        pass: "Skeletons used for heavy panes; CLS < 0.1."

  - name: "Layout & Responsiveness"
    id: "C2"
    checks:
      - id: "AF-005"
        level: "critical"
        title: "Safe area & notches"
        intent: "Respect iOS/Android cutouts."
        pass: "Uses env(safe-area-*) padding; no content under sensors."

      - id: "AF-006"
        level: "critical"
        title: "Adaptive breakpoints"
        intent: "Phone portrait, landscape, tablets."
        pass: "At least 3 breakpoints; HUD reflows without overlap."

      - id: "AF-007"
        level: "major"
        title: "One-handed reach"
        intent: "Primary controls reachable with thumb."
        pass: "Main actions in bottom zone; 44x44pt min targets."

      - id: "AF-008"
        level: "major"
        title: "Orientation locks per view"
        intent: "Prevent accidental flips."
        pass: "ASCII/terminal views can lock to landscape toggle."

      - id: "AF-009"
        level: "minor"
        title: "Haptics affordance"
        intent: "Micro feedback for actions."
        pass: "Tap/drag/commit haptics on supported devices."

  - name: "Navigation & IA"
    id: "C3"
    checks:
      - id: "AF-010"
        level: "critical"
        title: "3-step max to core loop"
        intent: "From boot to play quickly."
        pass: "Home→Play path ≤ 3 taps."

      - id: "AF-011"
        level: "major"
        title: "Global command palette"
        intent: "Fast jump between windows/modes."
        pass: "⌘K/🔍 button opens searchable actions."

      - id: "AF-012"
        level: "major"
        title: "Pause always available"
        intent: "Player control, debugging."
        pass: "Hardware back or on-screen pause works in all modes."

      - id: "AF-013"
        level: "minor"
        title: "Recently used views"
        intent: "Quick context return."
        pass: "History stack shows last 5 panes with thumbnails."

  - name: "Input & Controls"
    id: "C4"
    checks:
      - id: "AF-014"
        level: "critical"
        title: "Touch hit areas"
        intent: "Prevent mis-taps."
        pass: "Minimum 44x44pt; spacing ≥ 8pt."

      - id: "AF-015"
        level: "critical"
        title: "Virtual joystick / swipe schema"
        intent: "Exploration & platforming on mobile."
        pass: "Configurable: joystick, swipe, tap-to-path."

      - id: "AF-016"
        level: "major"
        title: "Gesture conflicts resolved"
        intent: "No accidental browser nav."
        pass: "Horizontal carousels don't trigger back/forward."

      - id: "AF-017"
        level: "major"
        title: "Keyboard overlays"
        intent: "Text prompts, knife-missile commands."
        pass: "Auto-scroll into view; adjust pan to avoid occlusion."

      - id: "AF-018"
        level: "minor"
        title: "Controller support"
        intent: "Optional but delightful."
        pass: "MFI/BT mapping present; UI hints adapt."

  - name: "Rendering: ASCII / Unicode UI"
    id: "C5"
    checks:
      - id: "AF-019"
        level: "critical"
        title: "Mono font fallback chain"
        intent: "Consistent grid metrics."
        pass: "FiraMono→JetBrainsMono→system-mono; ligatures off."

      - id: "AF-020"
        level: "critical"
        title: "Color-safe palette"
        intent: "Dark/Light + colorblind-accessible."
        pass: "Meets WCAG AA contrast; deuteranopia sim passes."

      - id: "AF-021"
        level: "major"
        title: "True cell-based layout"
        intent: "No kerning drift with emoji/combining marks."
        pass: "Measure with grapheme clusters; fixed cell renderer."

      - id: "AF-022"
        level: "major"
        title: "60fps text animations (budgeted)"
        intent: "Fluid but battery-aware."
        pass: "Animation frame cost < 8ms median."

      - id: "AF-023"
        level: "minor"
        title: "Unicode domains curated"
        intent: "Avoid PUA; stable symbols."
        pass: "Blocklist PUA; mapping table documented."

  - name: "Performance & Power"
    id: "C6"
    checks:
      - id: "AF-024"
        level: "critical"
        title: "CPU budget envelopes"
        intent: "Keep thermals sane."
        pass: "Background sim ≤ 10%; active ≤ 45% on mid device."

      - id: "AF-025"
        level: "critical"
        title: "Memory ceilings"
        intent: "Prevent OS kills."
        pass: "Heap ≤ 300MB; textures/fonts streamed."

      - id: "AF-026"
        level: "major"
        title: "Lazy load heavy panes"
        intent: "Faster initial render."
        pass: "Code-splitting routes/components."

      - id: "AF-027"
        level: "major"
        title: "Frame spike guard"
        intent: "Smoothness under load."
        pass: "Degrade visual effects when fps < 45 for 2s."

      - id: "AF-028"
        level: "minor"
        title: "Battery saver mode"
        intent: "Long sessions."
        pass: "Reduce fps/particles when on low power."

  - name: "Offline & Sync"
    id: "C7"
    checks:
      - id: "AF-029"
        level: "critical"
        title: "Offline-first saves"
        intent: "Play on subway/plane."
        pass: "Local save queue; conflict-free CRDT or last-write+diff."

      - id: "AF-030"
        level: "major"
        title: "Predictable autosave"
        intent: "No progress loss."
        pass: "Every 60s or major action; manual save button."

      - id: "AF-031"
        level: "major"
        title: "Sync bandwidth caps"
        intent: "Zero-cost dev runs."
        pass: "Backoff + batch; toggle '0-token dev mode'."

      - id: "AF-032"
        level: "minor"
        title: "Cloud save export"
        intent: "Obsidian/Jupyter pipelines."
        pass: "JSON/CSV export; share-to-file works mobile."

  - name: "Accessibility"
    id: "C8"
    checks:
      - id: "AF-033"
        level: "critical"
        title: "Screen reader paths"
        intent: "Non-visual navigation."
        pass: "Landmarks/roles; nav tree test passes."

      - id: "AF-034"
        level: "critical"
        title: "Scalable text (200%)"
        intent: "Legibility."
        pass: "No clipping or overlap at 200%."

      - id: "AF-035"
        level: "major"
        title: "Motion reduction"
        intent: "Vestibular safety."
        pass: "Prefers-reduced-motion respected."

      - id: "AF-036"
        level: "minor"
        title: "Colorblind modes"
        intent: "Alternate palettes."
        pass: "At least 2 presets; togglable in Settings."

  - name: "Audio & Haptics"
    id: "C9"
    checks:
      - id: "AF-037"
        level: "major"
        title: "Dynamic mixing"
        intent: "No clipping; ducking for dialogue."
        pass: "Music duck 6dB on VO; limiter headroom."

      - id: "AF-038"
        level: "minor"
        title: "Latency control"
        intent: "Rhythm/timing accuracy."
        pass: "User-adjustable offset ±100ms."

      - id: "AF-039"
        level: "minor"
        title: "Haptic patterns library"
        intent: "Consistent feel."
        pass: "Action→pattern map documented."

  - name: "ASCII HUD / Multi-View Windows"
    id: "C10"
    checks:
      - id: "AF-040"
        level: "critical"
        title: "View toggles are instant"
        intent: "Swap roguelike/base/tower views fast."
        pass: "≤ 150ms pane swap; cache prev state."

      - id: "AF-041"
        level: "major"
        title: "Overlay stack with priorities"
        intent: "Cutscenes/layers without input traps."
        pass: "Z-index spec; focus trap tests."

      - id: "AF-042"
        level: "major"
        title: "Minimap & heatmaps"
        intent: "At-a-glance state."
        pass: "ASCII minimap; colorized heat overlays."

      - id: "AF-043"
        level: "minor"
        title: "Quick actions bar"
        intent: "Frequent commands in 1 tap."
        pass: "Configurable 5–8 slots; long-press edit."

  - name: "Gameplay Loops (Idle/Builder/TD/Rogue)"
