# SimulatedVerse ChatDev skeleton — local only
project: SimulatedVerse
workdir: .
llm:
  provider: ollama
  base_url: http://127.0.0.1:11434
  model: llama3:8b-instruct   # change to any local model you have
  temperature: 0.2
  max_tokens: 1024
  timeout_s: 120
agents:
  team_file: agents/team.yml
plans:
  - name: smoke_readme_touch
    goal: "Append a small 'hello' section to tmp/chatdev_smoke/HelloSimulatedVerse.md"
    steps:
      - tool: write_file
        with:
          path: tmp/chatdev_smoke/HelloSimulatedVerse.md
          content: |
            # Hello, SimulatedVerse
            This artifact was generated by ChatDev (local Ollama).
tools:
  - name: write_file
    run: "python3 scripts/zeta/write_file.py --path {{path}} --content '{{content}}'"