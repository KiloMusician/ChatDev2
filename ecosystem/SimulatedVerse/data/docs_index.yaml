documentation_compendium:
  version: 1
  last_updated: "Bloomwave Phase"
  
  getting_started:
    overview: |
      CoreLink Foundation is an autonomous development ecosystem featuring:
      - Incremental/idle game mechanics with persistent progression
      - RimWorld-style storyteller AI for dynamic narrative generation  
      - Self-improving development loops with recursive enhancement
      - Culture-Ship aesthetics with quantum-layered capabilities
      - Complete agent-game symbiosis through bidirectional interaction
    
    quick_setup:
      - "Clone repository and run `npm install` to bootstrap dependencies"
      - "Start system with `npm run dev` - single port serves both frontend and backend"
      - "Access HUD at localhost:5000 for real-time system monitoring"
      - "Optional: Set ADMIN_TOKEN environment variable for administrative access"
      - "System auto-seeds with foundational data and begins autonomous operation"
    
    first_steps:
      - "Explore the ASCII HUD to understand system status and entropy levels"
      - "Visit /ops to see the task queue and autonomous processing"
      - "Check /agents to observe AI agent coordination and proposals" 
      - "Review /game to see the idle game mechanics in action"
      - "Use /settings to configure token budgets and optimization parameters"

  tutorials:
