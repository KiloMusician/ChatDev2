  api_reference:
    core_endpoints:
      health_status:
        "/healthz": "Basic system health check - returns 200 if operational"
        "/readyz": "Readiness check including seeds and scheduler - returns 200 when fully ready"
      
      operations:
        "/api/ops/status": "Current queue size, processing state, entropy levels"
        "/api/ops/queue": "POST NDJSON task batches for autonomous processing"  
        "/api/ops/reindex": "Rebuild indices and caches, return summary statistics"
      
      data_management:
        "/api/export": "Export system state as NDJSON for backup or analysis"
        "/api/import": "Import NDJSON data for system restoration or seeding"
        "/api/anchors": "CRUD operations for system stability anchors"
        "/api/directives": "CRUD operations for autonomous task directives"
      
      real_time:
        "/events": "Server-sent events stream for live system updates"
        "/ws": "WebSocket connection for bidirectional real-time communication"
    
    authentication:
      admin_token: "Set ADMIN_TOKEN environment variable for administrative access"
      bearer_auth: "Include 'Authorization: Bearer <token>' header for protected endpoints"
      rate_limits: "Token bucket algorithm protects mutating operations"
    
    data_formats:
      ndjson_tasks: |
        {"id":"Z1","phase":"foundational","type":"InfraPU","priority":"critical","title":"Task description"}
        One JSON object per line for batch processing
      
      sse_frames: |
        data: {"type":"status","entropy":0.1,"queue_size":5,"processing":true}
        Compact frames every 15 seconds with heartbeat keepalive
      
      websocket_messages: |
        {"type":"queue_update","size":3}
        {"type":"agent_proposal","agent":"architect","proposal":"optimize-cache"}
        Real-time bidirectional communication protocol

