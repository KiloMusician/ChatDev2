      impact: "critical"
      cost: "medium"
    32:
      task: "Compose prompts from snippets; never string-concatenate ad-hoc walls of text"
      type: "RefactorPU"
      impact: "high"
      cost: "low"
    33:
      task: "Role separation: planner/system/tool spec distinct from user/task content"
      type: "RefactorPU"
      impact: "medium"
      cost: "low"
    34:
      task: "Provide canonical few-shot sets per task family; reuse across runs"
      type: "RefactorPU"
      impact: "high"
      cost: "medium"
    35:
      task: "Declarative tool schemas (JSON Schema) to tightly constrain outputs"
      type: "RefactorPU"
      impact: "high"
      cost: "low"
    36:
      task: "Anti-hallucination preamble: cite files, include paths, if unsure → TODO"
      type: "RefactorPU"
      impact: "high"
      cost: "low"
    37:
      task: "Be brief unless asked: default"
      type: "RefactorPU"
      impact: "low"
      cost: "low"
    38:
      task: "Smart retrieval budget: top-k=3 unless recall fails; increase progressively"
      type: "RefactorPU"
      impact: "medium"
      cost: "low"
    39:
      task: "Use inline checks (return OK only if tests pass) to stop retries"
      type: "RefactorPU"
      impact: "medium"
      cost: "low"
    40:
      task: "Output schemas strictly validated; retry only the minimal failing field"
      type: "RefactorPU"
      impact: "high"
      cost: "low"

