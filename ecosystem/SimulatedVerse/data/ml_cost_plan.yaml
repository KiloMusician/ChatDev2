# 🚀 CoreLink Foundation - Ultra-Lean ML/LLM Cost-Discipline Master Plan
# 123 concrete steps for Infrastructure-First → Product optimization
# Minimal token spend, maximum productivity per CPU cycle

meta:
  title: "ML/LLM Cost-Discipline & Throughput Plan"
  version: "1.0.0"
  phases: 12
  total_steps: 123
  target: "Infrastructure-First → Product"
  constraints: ["Replit", "NDJSON PU queues", "ChatDev", "Ollama", "Culture Ship & Agents"]

# PHASE A: Infrastructure-First Baseline (make waste impossible)
phase_a_infrastructure:
  priority: 1
  steps:
    1: 
      task: "Single-port server owns SPA/API/SSE/WS; disable any second listeners"
      type: "RefactorPU"
      impact: "high"
      cost: "low"
    2:
      task: "Hard budget governor: daily token allowance + per-task budget weights; refuse overage"
      type: "RefactorPU" 
      impact: "critical"
      cost: "medium"
    3:
      task: "Global time/size limits: HTTP max body, request timeout, streaming cutoffs; fail fast"
      type: "RefactorPU"
      impact: "high"
      cost: "low"
    4:
      task: "Strict caching layer: in-memory LRU + KV/SQLite for identical prompts (key: model+temp+tools+prompt hash)"
      type: "RefactorPU"
      impact: "critical"
      cost: "high"
    5:
      task: "Response hashing & dedupe: drop duplicate generations in the same tick"
      type: "RefactorPU"
      impact: "medium"
      cost: "low"
    6:
      task: "Seedable RNG + deterministic ticks so evaluation is reproducible"
      type: "RefactorPU"
      impact: "high"
      cost: "medium"
    7:
      task: "Quiet mode throttle when entropy/budget cross thresholds; only unblockers allowed"
      type: "RefactorPU"
      impact: "critical"
      cost: "medium"
    8:
      task: "Telemetry ring buffer (≤2 MB) → snapshot → compact; no unbounded logs"
      type: "RefactorPU"
      impact: "high"
      cost: "low"
    9:
      task: "Cold start banner & degraded HUD; never burn tokens while not ready"
      type: "UXPU"
      impact: "medium"
      cost: "low"
    10:
      task: "Persistent queues (NDJSON PUs) with backoff; no tail-chasing failures"
      type: "RefactorPU"
      impact: "high"
      cost: "medium"
    11:
      task: "Strict input sanitizer & schema (Zod) for all PU payloads; reject junk early"
      type: "RefactorPU"
      impact: "high"
      cost: "low"
    12:
      task: "Rollup config: strip dev deps from prod; tree-shake unused client code"
      type: "PerfPU"
      impact: "medium"
      cost: "low"
    13:
      task: "Static asset compression + HTTP caching headers set correctly"
      type: "PerfPU"
      impact: "medium"
      cost: "low"
    14:
      task: "Model registry with explicit allowlist & defaults per task; no any model fallthrough"
      type: "RefactorPU"
      impact: "critical"
      cost: "medium"
    15:
      task: "Feature flags: REPLIT_AGENT, OLLAMA_REMOTE, WASM_FALLBACK—so the loop never hard-fails"
      type: "RefactorPU"
      impact: "high"
      cost: "low"

# PHASE B: Model Strategy (smaller, cheaper, smarter)  
phase_b_model_strategy:
  priority: 2
  steps:
    16:
      task: "Default to small local (e.g., 7B) for scaffold/explain; gate big models behind approval"
      type: "RefactorPU"
      impact: "critical"
      cost: "low"
    17:
      task: "Quantized weights by default (Q4/Q5); prefer gguf for Ollama"
      type: "RefactorPU"
      impact: "high"
      cost: "low"
    18:
      task: "Use LoRA/adapters for domain fit; never full fine-tune on Replit"
      type: "RefactorPU"
      impact: "medium"
      cost: "low"
    19:
      task: "Separate reasoning vs. drafting models (cheap planner → small drafter)"
      type: "RefactorPU"
      impact: "high"
      cost: "medium"
    20:
      task: "Split-brain prompting: outline with tiny model, detail with small/medium only for impacted sections"
      type: "RefactorPU"
      impact: "high"
      cost: "medium"
    21:
      task: "Temperature discipline: ≤0.2 for code, ≤0.5 for prose; raise temp only with explicit flag"
      type: "RefactorPU"
      impact: "medium"
      cost: "low"
    22:
      task: "Max tokens caps per route; clamp long contexts via retrieval, not raw paste"
      type: "RefactorPU"
      impact: "high"
      cost: "low"
    23:
      task: "WASM on-device inference fallback for micro-classifiers/heuristics"
      type: "FeaturePU"
      impact: "medium"
      cost: "high"
    24:
      task: "Embedding model is tiny + cached; never recompute unchanged docs"
      type: "RefactorPU"
      impact: "high"
      cost: "medium"
    25:
      task: "Toolformer-style stub: attempt rule-based/tool calls before LLM"
      type: "RefactorPU"
      impact: "high"
      cost: "medium"
    26:
      task: "Summon big-model only when (impact*uncertainty) exceeds threshold"
      type: "RefactorPU"
      impact: "critical"
      cost: "low"
    27:
      task: "Top-p clipping to stabilize drafts"
      type: "RefactorPU"
      impact: "low"
      cost: "low"
    28:
      task: "Stop-sequence guards to prevent rambling"
      type: "RefactorPU"
      impact: "medium"
      cost: "low"
    29:
      task: "Prompt short-answer by default; long response requires allow_long=true"
      type: "RefactorPU"
      impact: "medium"
      cost: "low"
    30:
      task: "Early-exit streaming: cut when acceptance heuristic passes"
      type: "RefactorPU"
      impact: "medium"
      cost: "medium"

