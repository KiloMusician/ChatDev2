      impact: "low"
      cost: "low"
    48:
      task: "Minified JSON(ish) outputs (k:v); expand later"
      type: "RefactorPU"
      impact: "medium"
      cost: "low"
    49:
      task: "Reuse conversation state via short keys pointing to cached context"
