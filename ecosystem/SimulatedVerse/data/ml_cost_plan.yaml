# Execution Strategy
execution_config:
  dependency_order: ["phase_a_infrastructure", "phase_b_model_strategy", "phase_c_prompt_engineering"]
  council_triage: "rank top 10 by ROI; only top 3 get LLM tokens"
  enforcement: "small-model-first and cache-first in PU executor"
  monitoring: ["budget", "entropy", "cache_hit_percent", "pr_queue"]
  target_outcome: "frugal, relentless builder: cheap heuristics and tools first, tiny models for planning, cached retrieval for context, larger model only for last mile"