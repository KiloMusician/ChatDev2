<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" />
  <title>ΞNuSyQ SimulatedVerse</title>
  <style>
    :root{
      --tileW: 14px; --tileH: 18px;
      --hudH: 120px;
      --bg: #0a0c10; --fg:#e6edf3; --accent:#59f;
    }
    *{box-sizing:border-box}
    html,body{height:100%;margin:0;background:var(--bg);color:var(--fg);font-family:ui-monospace,Consolas,Menlo,monospace}
    #app{display:flex;flex-direction:column;height:100%;}
    #topbar{display:flex;gap:.5rem;align-items:center;padding:.5rem;border-bottom:1px solid #1b1f23;background:#0e1116;}
    #topbar .btn{padding:.35rem .6rem;background:#161b22;border:1px solid #30363d;border-radius:6px;cursor:pointer}
    #topbar .btn.active{outline:2px solid var(--accent)}
    #stage{flex:1;display:flex;overflow:hidden}
    #canvasWrap{flex:1;display:flex;justify-content:center;align-items:center;overflow:auto}
    #hud{height:var(--hudH);border-top:1px solid #1b1f23;background:#0e1116;padding:.5rem;display:grid;grid-template-columns:1fr auto;gap:.5rem}
    #miniNav{display:flex;gap:.25rem;flex-wrap:wrap}
    #miniNav .chip{padding:.25rem .5rem;border:1px solid #30363d;border-radius:999px;cursor:pointer;background:#161b22}
    #log{font-size:12px;line-height:1.3;max-height:calc(var(--hudH) - 1rem);overflow:auto;white-space:pre-wrap}
    #touch{position:fixed;right:.75rem;bottom:calc(var(--hudH) + .75rem);display:none;gap:.3rem;flex-direction:column}
    .padrow{display:flex;gap:.3rem;justify-content:center}
    .padbtn{width:42px;height:42px;border-radius:8px;background:#1f232a;border:1px solid #30363d}
    @media (max-width: 860px){
      :root{ --tileW: 11px; --tileH: 15px; --hudH: 160px; }
      #touch{display:flex}
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="topbar">
      <div class="btn" data-view="microbe">Microbe</div>
      <div class="btn" data-view="colony">Colony</div>
      <div class="btn" data-view="city">City</div>
      <div class="btn" data-view="planet">Planet</div>
      <div class="btn" data-view="system">System</div>
      <div class="btn" data-view="space">Space</div>
      <div class="btn" id="btnCascade">Cascade</div>
      <div class="btn" id="btnGraph">ChatDev Viz</div>
      <div style="margin-left:auto;opacity:.8">ΞNuSyQ v0.1</div>
    </div>
    <div id="stage">
      <div id="canvasWrap"></div>
    </div>
    <div id="hud">
      <div id="log">Booting ΞNuSyQ SimulatedVerse...</div>
      <div id="miniNav"></div>
    </div>
  </div>

  <!-- Touch D-pad -->
  <div id="touch">
    <div class="padrow"><button class="padbtn" data-d="up">▲</button></div>
    <div class="padrow">
      <button class="padbtn" data-d="left">◀</button>
      <button class="padbtn" data-d="act">●</button>
      <button class="padbtn" data-d="right">▶</button>
    </div>
    <div class="padrow"><button class="padbtn" data-d="down">▼</button></div>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
