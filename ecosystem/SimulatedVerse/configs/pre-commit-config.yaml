repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.5.5
    hooks: [{id: ruff, args: ["--fix"]}]
  - repo: https://github.com/psf/black
    rev: 24.4.2
    hooks: [{id: black}]
  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v4.0.0-alpha.8
    hooks: [{id: prettier}]
  - repo: https://github.com/pre-commit/mirrors-eslint
    rev: v9.0.0
    hooks: [{id: eslint}]
  - repo: https://github.com/returntocorp/semgrep
    rev: v1.71.0
    hooks:
      - id: semgrep
        args: ["--config", "ops/linters/semgrep_rules.yml", "--fix"]
  - repo: local
    hooks:
      - id: gdlint
        name: gdlint
        entry: gdlint
        language: system
        types: [file]
        files: \.gd$
      - id: gdformat
        name: gdformat
        entry: gdformat
        language: system
        types: [file]
        files: \.gd$