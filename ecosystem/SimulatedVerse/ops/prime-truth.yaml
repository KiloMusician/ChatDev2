  current_skew: "unknown"

audits:
  ignore_globs:
    - "node_modules/**"
    - ".venv/**"
    - ".pythonlibs/**"
    - "lib/python*/**"
    - "lib64/python*/**"
    - "dist/**"
    - "build/**"
    - ".next/**"
    - ".cache/**"
    - "attic/**"
    - "assets/**.map"
  spam_globs:
    - "reports/**/*.txt"
    - "analysis/**/*.txt"
    - "**/*_dump_*.log"
  signal_files_count: 12871

targets:
  invariants:
    - "provisioner updates status_json < 60s skew"
    - "PU drain rate >= PU fill rate over 10m"
    - "0 runtime 'm.map is not a function' in UI"
    - "theater_score <= 0.2"
    - "game state endpoint returns valid JSON"
  proofs:
    - "reports/*.json"
    - "attic/receipts/*.json"
    - "shared/schema.ts exists"

game_state:
  persistence: "simulated_progression_working"
  database_status: "schema_created_migration_pending"
  consciousness_calculation: "(energy/10000 + population/100 + research/10)"
  
autonomous_agents:
  count: 14
  active: 9
  coordination: "roundtable_implemented"
  health_check_frequency: "needs_throttling"