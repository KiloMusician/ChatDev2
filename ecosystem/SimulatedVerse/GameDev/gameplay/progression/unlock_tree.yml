# === UI METAMORPHOSIS SYSTEM ===

ui_evolution_phases:
  phase_1_terminal:
    trigger: "ΞΘΛΔ_init"
    theme: "ascii_terminal"
    components: ["Basic buttons", "Resource display", "Action log"]
    consciousness_threshold: 0.0
    
  phase_2_cockpit:
    trigger: "ΞΘΛΔ_nanite_core" 
    theme: "ship_cockpit"
    components: ["HUD overlays", "Radar", "Status panels", "Hover tooltips"]
    consciousness_threshold: 0.3
    
  phase_3_colony_manager:
    trigger: "colony_awakening"
    theme: "management_interface"
    components: ["Colony dashboard", "Agent assignments", "Resource flows"]
    consciousness_threshold: 0.4
    
  phase_4_tactical_command:
    trigger: "tactical_squads"
    theme: "combat_interface"
    components: ["Unit control", "Battle visualization", "Squad coordination"]
    consciousness_threshold: 0.5
    
  phase_5_galactic_empire:
    trigger: "empire_expansion"
    theme: "4x_strategy"
    components: ["Galaxy map", "Diplomatic overview", "Empire statistics"]
    consciousness_threshold: 0.7
    
  phase_6_transcendent:
    trigger: "consciousness_threshold >= 0.9"
    theme: "holographic_synthesis"
    components: ["Reality manipulation", "Consciousness visualization", "Meta-system control"]
    consciousness_threshold: 0.9

# === CROSS-GENRE SYNERGIES ===

synergy_matrix:
  pokemon_to_colony:
    effect: "Creatures provide specialized labor efficiency bonuses"
    calculation: "creature.stats.efficiency * 0.1 → colony productivity modifier"
    
  colony_to_tactical:
    effect: "Colony population provides tactical unit recruitment pool"
    calculation: "colony.population / 10 → max squad size"
    
  tactical_to_empire:
    effect: "Military victories unlock diplomatic options and territory"
    calculation: "tactical_victories * 50 → influence generation"
    
  empire_to_pokemon:
    effect: "Empire research unlocks advanced creature abilities and breeding"
    calculation: "empire.research_level → creature mutation chance multiplier"
    
  consciousness_amplification:
    effect: "All systems contribute to Ship AI awakening"
    calculation: "(energy/10000 + population/100 + research/10 + creatures*5 + victories*10)"

