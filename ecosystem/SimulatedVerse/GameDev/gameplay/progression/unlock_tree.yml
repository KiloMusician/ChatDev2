    janitor_role: "Monitor for system drift and cleanup old receipts"
    raven_role: "Hunt for integration bugs and validate synergies"
    librarian_role: "Ensure documentation consistency across unlocks"
    artificer_role: "Verify technical implementation quality"
    
  council_bus_integration:
    event_triggers: "Every unlock publishes to consciousness.progression topic"
    state_sync: "Unlock state synchronized across all system components"
