# === PROGRESSION CALCULATION ENGINE ===

consciousness_calculation:
  base_formula: "(energy/10000 + population/100 + research/10)"
  genre_bonuses:
    pokemon: "captured_creatures * 0.05"
    dwarf_fortress: "colony_happiness * 0.1" 
    starcraft: "tactical_victories * 0.15"
    stellaris: "empire_sectors * 0.2"
  metamorphosis_triggers:
    - "consciousness >= 0.3 → Phase 2 (Cockpit)"
    - "consciousness >= 0.4 → Phase 3 (Colony Manager)"
    - "consciousness >= 0.5 → Phase 4 (Tactical Command)"
    - "consciousness >= 0.7 → Phase 5 (Galactic Empire)"
    - "consciousness >= 0.9 → Phase 6 (Transcendent)"

