<!doctype html>
<html lang="en">
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Rosetta Panel</title>
<style>
  :root { font-family: system-ui, Roboto, Arial; }
  body { margin: 0; background:#0b0f14; color:#e6eef7; }
  header { padding:12px 16px; position:sticky; top:0; background:#0b0f14ee; backdrop-filter:saturate(120%) blur(4px); }
  #search { width:100%; padding:10px; border-radius:8px; border:1px solid #2a3542; background:#101720; color:#e6eef7; }
  .list { padding:8px 12px 24px; }
  .card { border:1px solid #223142; border-radius:12px; padding:12px; margin:10px 0; background:#111926; }
  .title { font-weight:700; }
  .meta { font-size:12px; color:#a8b7c6; margin-top:6px; }
  .nodes { font-size:12px; color:#cfe1f6; margin-top:8px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
</style>
<header>
  <input id="search" placeholder="Filter by title, node, or tier…" />
</header>
<div class="list" id="list"></div>
<script src="./rosetta.js"></script>
</html>
