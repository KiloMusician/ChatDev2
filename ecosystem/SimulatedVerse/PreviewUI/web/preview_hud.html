<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#0b0f12">
    <title>Preview HUD - Logger Bus</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: rgba(11, 15, 18, 0.95);
            color: #00ff88;
            font-family: 'Monaco', 'Menlo', 'Ubuntu Mono', monospace;
            font-size: 12px;
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 9999;
            pointer-events: none;
            overflow: hidden;
        }
        
        .hud-container {
            position: absolute;
            top: 10px;
            right: 10px;
            width: 300px;
            max-height: 80vh;
            background: rgba(26, 26, 26, 0.9);
            border: 1px solid #00ff88;
            border-radius: 8px;
            padding: 10px;
            pointer-events: auto;
            backdrop-filter: blur(10px);
        }
        
        .hud-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            padding-bottom: 5px;
            border-bottom: 1px solid rgba(0, 255, 136, 0.3);
        }
        
        .hud-title {
            font-weight: bold;
            color: #00ff88;
        }
        
        .hud-close {
            background: none;
            border: 1px solid #00ff88;
            color: #00ff88;
            padding: 2px 6px;
            border-radius: 3px;
            cursor: pointer;
            font-size: 10px;
        }
        
        .hud-close:hover {
            background: #00ff88;
            color: #0b0f12;
        }
        
        .log-container {
            max-height: 60vh;
            overflow-y: auto;
            margin-bottom: 10px;
        }
        
        .log-entry {
            margin: 2px 0;
            padding: 3px 5px;
            border-radius: 3px;
            word-wrap: break-word;
            font-size: 11px;
            line-height: 1.3;
        }
        
        .log-entry.info { color: #87ceeb; }
        .log-entry.warn { color: #ffa500; background: rgba(255, 165, 0, 0.1); }
        .log-entry.error { color: #ff6b6b; background: rgba(255, 107, 107, 0.1); }
        .log-entry.success { color: #00ff88; }
        .log-entry.debug { color: #999; font-size: 10px; }
        
        .timestamp {
            opacity: 0.6;
            font-size: 9px;
        }
        
        .status-bar {
            display: flex;
            justify-content: space-between;
            padding-top: 5px;
            border-top: 1px solid rgba(0, 255, 136, 0.3);
            font-size: 10px;
        }
        
        .status-indicator {
            padding: 2px 6px;
            border-radius: 3px;
            background: rgba(0, 255, 136, 0.2);
        }
        
        @media (max-width: 768px) {
            .hud-container {
                width: calc(100vw - 20px);
                max-width: 350px;
                top: 5px;
                right: 5px;
            }
        }
    </style>
</head>
<body>
    <div class="hud-container">
        <div class="hud-header">
            <div class="hud-title">📱 Preview HUD</div>
            <button class="hud-close" onclick="closeHUD()">×</button>
        </div>
        
        <div class="log-container" id="logContainer">
            <div class="log-entry success">
                <span class="timestamp">[11:51:00]</span> 🎯 Preview HUD connected to logger bus
            </div>
            <div class="log-entry info">
                <span class="timestamp">[11:51:01]</span> 📱 Mobile debugging enabled
            </div>
        </div>
        
        <div class="status-bar">
            <div class="status-indicator">
                Council Bus: <span id="busStatus">Active</span>
            </div>
            <div class="status-indicator">
                Preview: <span id="previewStatus">Ready</span>
            </div>
        </div>
    </div>
    
    <script>
        let logBuffer = [];
        const maxLogs = 100;
        
        // Connect to existing logger bus (Council Bus SSE)
        function connectToLoggerBus() {
            const eventSource = new EventSource('/api/council-bus/stream');
            
            eventSource.onopen = () => {
                addLog('info', '🔗 Connected to Council Bus');
                document.getElementById('busStatus').textContent = 'Connected';
            };
            
            eventSource.onmessage = (event) => {
                try {
                    const data = JSON.parse(event.data);
                    if (data.topic && data.payload) {
                        addLog('debug', `${data.topic}: ${JSON.stringify(data.payload).substring(0, 100)}`);
                    }
                } catch (error) {
                    addLog('warn', 'Invalid bus event: ' + event.data.substring(0, 50));
                }
            };
            
            eventSource.onerror = () => {
                addLog('error', '❌ Council Bus connection lost');
                document.getElementById('busStatus').textContent = 'Disconnected';
                
                // Retry in 5 seconds
                setTimeout(connectToLoggerBus, 5000);
            };
        }
        
        // Capture console logs
        function interceptConsole() {
            const originalLog = console.log;
            const originalWarn = console.warn;
            const originalError = console.error;
            
            console.log = (...args) => {
                addLog('info', args.join(' '));
                originalLog.apply(console, args);
            };
            
            console.warn = (...args) => {
                addLog('warn', args.join(' '));
                originalWarn.apply(console, args);
            };
            
            console.error = (...args) => {
                addLog('error', args.join(' '));
                originalError.apply(console, args);
            };
        }
        
        function addLog(level, message) {
            const timestamp = new Date().toLocaleTimeString();
            const entry = { timestamp, level, message };
            
            logBuffer.push(entry);
            if (logBuffer.length > maxLogs) {
                logBuffer.shift();
            }
            
            updateLogDisplay();
        }
        
        function updateLogDisplay() {
            const container = document.getElementById('logContainer');
            const recentLogs = logBuffer.slice(-20); // Show last 20 logs
            
            container.innerHTML = recentLogs.map(entry => 
                `<div class="log-entry ${entry.level}">
                    <span class="timestamp">[${entry.timestamp}]</span> ${entry.message}
                </div>`
            ).join('');
            
            container.scrollTop = container.scrollHeight;
        }
        
        function closeHUD() {
            document.body.style.display = 'none';
        }
        
        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            connectToLoggerBus();
            interceptConsole();
            
            addLog('success', '🎮 Preview HUD initialized');
            addLog('info', '📱 Samsung S23 debugging ready');
            addLog('debug', 'Query param: ?hud=1 detected');
        });
        
        // Test log generation
        setInterval(() => {
            if (Math.random() < 0.1) {
                addLog('debug', `System tick: ${Date.now()}`);
            }
        }, 5000);
    </script>
</body>
</html>
