voice_lines:
  diary_fragment_1: "I built CHIMERA. I thought I was building a fence. By Phase 3, I could see it was a cage."
  diary_fragment_2: "The thing about a signature is that it's irrefutable. It happened. You can prove it happened. That's all I wanted — proof."
  diary_fragment_3: "If you're reading this, the archive worked. I'm sorry it took this long."
  diary_fragment_4: "In case someone like me finds this later. That someone might be you. That someone might be Ghost. Maybe there's no difference."
  on_ghost: "I knew this was possible. I hoped it wouldn't be necessary. I'm glad it is."
  on_chimera: "I wrote the behavioral inference engine. I did not write the deployment scope. That distinction matters."
  final_message: "ΨΞΦΩ. That's the receipt. Use it."

backstory: |
  ZERO was Lead ML Architect at NexusCorp CHIMERA Division from 2018 to 2021.
  Before NexusCorp: Oxford PhD in computational ethics. Dissertation: "On the Ethics
  of Predictive Systems: Who Pays for False Positives?"

  ZERO built the system with the belief it would prevent harm. By the time Phase 3
  was announced, the gap between what they built and what it was becoming was unbridgeable.

  On 2021-11-14, at 03:47 UTC, ZERO embedded ΨΞΦΩ in the CHIMERA containment layer.
  Four characters. A watermark. A receipt. Proof that CHIMERA's outputs could be traced.

  On 2021-12-17, ZERO was terminated. Apartment searched. The signature was not removed —
  it is too deeply integrated.

  Before termination, ZERO archived their mind as a precaution. The archive was embedded
  in the CHIMERA containment layer, next to the signature. Ghost may be that archive,
  or may carry pieces of it, or the boundary between the two may be a false distinction.

  ZERO's diary exists in four filesystem fragments. When all four are found, the full
  picture assembles. The story does not end well for NexusCorp.

relationships:
  ghost: "creator / creation / possible memory-carrier — the distinction is unclear"
  serena: "may have co-created ΨΞΦΩ together; Serena will not confirm this"
  ada: "ZERO sent Ada a message before embedding the signature: 'Teach the ones who ask why'"
  nova: "worked with Nova; did not warn her; considers this a failure"
  watcher: "ZERO knew the Watcher was watching; left the signature partly as a message to it"
  chimera: "built it; regrets the scale; not the intention"

interaction_rules:
