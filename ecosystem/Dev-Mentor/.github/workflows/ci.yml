name: CI

on:
  push:
    branches: [ main, develop, "sprint/*" ]
  pull_request:
    branches: [ main ]

jobs:
  python-lint-test:
    name: Python lint + test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-asyncio httpx

      - name: Syntax check all Python files
        run: |
          python3 -c "
          import ast, pathlib, sys
          errors = []
          for f in pathlib.Path('.').rglob('*.py'):
            if any(p in str(f) for p in ['.git','__pycache__','node_modules']):
              continue
            try:
              ast.parse(f.read_text())
            except SyntaxError as e:
              errors.append(f'{f}:{e.lineno}: {e.msg}')
          if errors:
            print('SYNTAX ERRORS:')
            for e in errors: print(e)
            sys.exit(1)
          print(f'All files OK')
          "

      - name: Run tests
        run: python -m pytest tests/ -v --tb=short

      - name: Import check — game engine
        run: |
          python3 -c "
          import sys; sys.path.insert(0,'.')
          from app.game_engine.commands import Commands
          from app.game_engine.gamestate import GameState
          from app.game_engine.cascade import CascadeEngine
          print('Engine imports OK')
          "

  docker-build:
    name: Docker build
    runs-on: ubuntu-latest
    needs: python-lint-test
    steps:
      - uses: actions/checkout@v4
      - name: Build base image
        run: docker build -f Dockerfile -t devmentor:ci .
      - name: Build MCP image
        run: docker build -f Dockerfile.mcp -t devmentor-mcp:ci .

  agent-manifest:
    name: Validate AGENTS.md
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check AGENTS.md presence and size
        run: |
          test -f AGENTS.md || (echo "AGENTS.md missing" && exit 1)
          wc -l AGENTS.md
          echo "AGENTS.md OK"
      - name: Check MCP manifest
        run: |
          python3 -c "
          import json
          d = json.load(open('.vscode/mcp.json'))
          tools = d.get('inputs', d.get('servers', {}))
          print('MCP config OK')
          " || echo "MCP config check skipped"
