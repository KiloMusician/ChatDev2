name: Default JS CLI
type: cli
language: javascript
runtime_profile: native_terminal
description: Default JavaScript CLI template for Node-based utilities.
metadata: {}
dependencies:
  - commander
  - chalk
file_structure:
  README.md: Project overview and usage examples
  src/main.js: CLI entry point
