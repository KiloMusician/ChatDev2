# Sector Definitions for NuSyQ-Hub Ecosystem
# Defines organizational boundaries, ownership, and agent routing
# Version: 1.0.0

sectors:
  core_infrastructure:
    id: 1
    name: "Core Infrastructure"
    description: "Foundation systems, quantum resolver, performance monitoring"
    path_patterns:
      - "src/core/**"
      - "src/setup/**"
      - "src/quantum/**"
    primary_agents:
      - librarian
      - zod
      - redstone
    secondary_agents:
      - quantum_resolver
    responsibilities:
      - "System initialization and configuration"
      - "Quantum problem resolution"
      - "Performance monitoring and optimization"
      - "Core data structures and utilities"
    criticality: "CRITICAL"
    proof_gate_requirements:
      min_reviewers: 2
      require_quantum_validation: true
      smoke_tests:
        - "boot_test"
        - "import_test"

  ai_orchestration:
    id: 2
    name: "AI Orchestration"
    description: "Agent coordination, multi-AI workflows, ChatDev integration"
    path_patterns:
      - "src/ai/**"
      - "src/orchestration/**"
      - "src/automation/**"
    primary_agents:
      - alchemist
      - council
      - artificer
      - party
    secondary_agents:
      - chatdev_coordinator
      - ollama_integrator
    responsibilities:
      - "Multi-AI system coordination"
      - "ChatDev workflow management"
      - "Autonomous monitoring and execution"
      - "Agent task distribution"
    criticality: "HIGH"
    proof_gate_requirements:
      min_reviewers: 2
      require_council_vote: true
      smoke_tests:
        - "agent_health_test"
        - "orchestration_test"

  integration:
    id: 3
    name: "Integration"
    description: "Cross-system bridges, SimulatedVerse, ChatDev, Ollama connections"
    path_patterns:
      - "src/integration/**"
      - "src/copilot/**"
    primary_agents:
      - consciousness_bridge
      - party
      - culture_ship
    secondary_agents:
      - simulatedverse_bridge
      - ollama_hub
    responsibilities:
      - "SimulatedVerse async integration"
      - "ChatDev launcher coordination"
      - "Ollama model routing"
      - "Consciousness bridge maintenance"
      - "Cross-repository protocol management"
    criticality: "HIGH"
    proof_gate_requirements:
      min_reviewers: 1
      require_integration_tests: true
      smoke_tests:
        - "async_protocol_test"
        - "bridge_health_test"

  diagnostic_healing:
    id: 4
    name: "Diagnostic & Healing"
    description: "Health monitoring, self-repair, system diagnostics"
    path_patterns:
      - "src/diagnostics/**"
      - "src/healing/**"
      - "src/analysis/**"
    primary_agents:
      - system_health_assessor
      - quantum_resolver
      - zod
    secondary_agents:
      - broken_paths_analyzer
      - import_health_checker
    responsibilities:
      - "Repository health assessment"
      - "Broken path detection and repair"
      - "Import health validation"
      - "Self-healing automation"
    criticality: "HIGH"
    proof_gate_requirements:
      min_reviewers: 1
      require_health_validation: true
      smoke_tests:
        - "diagnostic_test"
        - "healing_test"

  configuration:
    id: 5
    name: "Configuration"
    description: "Settings, secrets, API configs, feature flags"
    path_patterns:
      - "config/**"
      - "**/*.env*"
      - "**/*.config.*"
    primary_agents:
      - artificer
      - librarian
    secondary_agents:
      - config_validator
    responsibilities:
      - "Configuration file management"
      - "Secret management (encrypted)"
      - "Feature flag coordination"
      - "Environment template maintenance"
    criticality: "CRITICAL"
    proof_gate_requirements:
      min_reviewers: 2
      require_security_scan: true
      forbid_hardcoded_secrets: true
      smoke_tests:
        - "config_validation_test"
        - "secret_encryption_test"

  testing:
    id: 6
    name: "Testing"
    description: "Quality assurance, validation, testing chamber"
    path_patterns:
      - "tests/**"
      - "testing_chamber/**"
    primary_agents:
      - pytest_runner
      - validation_suite
      - zod
    secondary_agents:
      - test_coverage_analyzer
    responsibilities:
      - "Unit and integration testing"
      - "Testing chamber promotion workflow"
      - "Coverage analysis"
      - "Test fixture management"
    criticality: "HIGH"
    proof_gate_requirements:
      min_reviewers: 1
      require_test_coverage: true
      min_coverage_percent: 80
      smoke_tests:
        - "test_runner_test"
        - "coverage_test"

  documentation:
    id: 7
    name: "Documentation"
    description: "Knowledge management, context generation, guides"
    path_patterns:
      - "docs/**"
      - "web/**"
      - "**/*.md"
      - "**/*.rst"
    primary_agents:
      - librarian
      - artificer
    secondary_agents:
      - context_generator
      - documentation_builder
    responsibilities:
      - "Documentation generation and maintenance"
      - "Context file management"
      - "Knowledge base curation"
      - "Web interface documentation"
    criticality: "MEDIUM"
    proof_gate_requirements:
      min_reviewers: 1
      require_spell_check: true
      require_link_validation: true
      smoke_tests:
        - "doc_build_test"
        - "link_check_test"

# Cross-sector coordination
coordination_rules:
  # Changes affecting multiple sectors
  multi_sector_changes:
    require_coordination: true
    min_approvals: 2
    affected_sectors_must_review: true

  # Sector dependencies
  dependencies:
    core_infrastructure:
      - all_sectors  # Core affects everything
    ai_orchestration:
      - integration
      - diagnostic_healing
    integration:
      - ai_orchestration
      - configuration

  # Escalation paths
  escalation:
    critical_issues:
      notify_sectors:
        - core_infrastructure
        - diagnostic_healing
      require_immediate_review: true

    security_issues:
      notify_sectors:
        - configuration
        - core_infrastructure
      require_quantum_validation: true

# Agent routing strategy
routing:
  strategy: "proof_based"  # Options: "proof_based", "round_robin", "load_balanced"

  proof_based_routing:
    # Route based on proof requirements
    critical_changes:
      sectors: ["core_infrastructure", "configuration"]
      min_agents: 3

    high_priority:
      sectors: ["ai_orchestration", "integration", "diagnostic_healing"]
      min_agents: 2

    standard_changes:
      sectors: ["testing", "documentation"]
      min_agents: 1

  load_balancing:
    enabled: true
    max_concurrent_tasks_per_agent: 5
    rebalance_interval_minutes: 15

  fallback:
    # If primary agents unavailable
    use_secondary: true
    escalate_after_minutes: 30

# Sector health monitoring
monitoring:
  enabled: true
  check_interval_minutes: 30
  metrics:
    - file_count
    - error_rate
    - test_coverage
    - agent_activity
    - integration_health

  alerts:
    critical_threshold:
      error_rate: 0.05  # 5% error rate
      test_coverage: 0.70  # Below 70%

    notification:
      slack: false
      email: false
      console: true

