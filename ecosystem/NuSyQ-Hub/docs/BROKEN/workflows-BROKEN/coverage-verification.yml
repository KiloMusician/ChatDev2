name: Repository Coverage Verification

on:
  schedule:
    # Run weekly on Sunday at midnight UTC
    - cron: '0 0 * * 0'
  workflow_dispatch:
    # Allow manual trigger
  push:
    branches: [ main ]
    paths:
      - '.github/**'
      - 'src/**'
      - 'docs/**'
      - '**/*CONTEXT*.md'

jobs:
  coverage-verification:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: рџ“Ґ Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: рџђЌ Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.13'
          cache: 'pip'

      - name: рџ“¦ Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pathlib datetime json

      - name: рџ“ё Create Coverage Snapshot
        id: snapshot
        run: |
          python src/orchestration/snapshot_maintenance_system.py

          # Extract coverage percentage from latest snapshot
          LATEST_SNAPSHOT=$(ls -t .snapshots/directory_coverage_snapshot_*.json | head -1)
          COVERAGE=$(python -c "import json; data=json.load(open('$LATEST_SNAPSHOT')); print(data['coverage_summary']['coverage_percentage'])")

          echo "coverage=$COVERAGE" >> $GITHUB_OUTPUT
          echo "snapshot_file=$LATEST_SNAPSHOT" >> $GITHUB_OUTPUT

      - name: рџ“Љ Coverage Status Check
        run: |
          COVERAGE="${{ steps.snapshot.outputs.coverage }}"

          if (( $(echo "$COVERAGE >= 95" | bc -l) )); then
            echo "вњ… Excellent coverage: $COVERAGE%"
            echo "COVERAGE_STATUS=success" >> $GITHUB_ENV
          elif (( $(echo "$COVERAGE >= 90" | bc -l) )); then
            echo "вљ пёЏ Good coverage but room for improvement: $COVERAGE%"
            echo "COVERAGE_STATUS=warning" >> $GITHUB_ENV
          else
            echo "вќЊ Coverage below threshold: $COVERAGE%"
            echo "COVERAGE_STATUS=failure" >> $GITHUB_ENV
          fi

      - name: рџ“ќ Generate Coverage Report
        run: |
          SNAPSHOT_FILE="${{ steps.snapshot.outputs.snapshot_file }}"
          COVERAGE="${{ steps.snapshot.outputs.coverage }}"

          cat > coverage_report.md << EOF
          # рџ“ё Repository Coverage Verification Report

          **Date**: $(date)
          **Coverage**: $COVERAGE%
          **Status**: ${{ env.COVERAGE_STATUS }}
          **Snapshot**: \`$(basename $SNAPSHOT_FILE)\`

          ## рџ“Љ Coverage Summary

          \`\`\`json
          $(cat $SNAPSHOT_FILE | jq '.coverage_summary')
          \`\`\`

          ## рџ”Ќ Missing Documentation

          \`\`\`json
          $(cat $SNAPSHOT_FILE | jq '.coverage_summary.missing_list')
          \`\`\`

          ## рџЏ·пёЏ Quality Assessment

          \`\`\`json
          $(cat $SNAPSHOT_FILE | jq '.coverage_summary.quality_assessment')
          \`\`\`

          ---
          *Generated by KILO-FOOLISH Automated Coverage Verification*
          EOF

      - name: рџ’ѕ Commit Coverage Results
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "KILO Coverage Bot"

          git add .snapshots/
          git add coverage_report.md

          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "рџ“ё Automated coverage verification snapshot - ${{ steps.snapshot.outputs.coverage }}%

            - Coverage: ${{ steps.snapshot.outputs.coverage }}%
            - Status: ${{ env.COVERAGE_STATUS }}
            - Snapshot: $(basename ${{ steps.snapshot.outputs.snapshot_file }})
            - Generated: $(date)"

            git push
          fi

      - name: рџ“‹ Create Issue on Coverage Decline
        if: env.COVERAGE_STATUS == 'failure'
        uses: actions/github-script@v6
        with:
          script: |
            const coverage = '${{ steps.snapshot.outputs.coverage }}';

            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `рџ“‰ Documentation Coverage Below Threshold: ${coverage}%`,
              body: `
              ## вљ пёЏ Coverage Alert

              Repository documentation coverage has fallen below the 90% threshold.

              **Current Coverage**: ${coverage}%
              **Threshold**: 90%
              **Snapshot**: \`${{ steps.snapshot.outputs.snapshot_file }}\`

              ## рџ“‹ Action Required

              Please review the missing documentation directories and add appropriate contextual files.

              ## рџ”Ќ Missing Documentation

              Check the latest snapshot file for details on which directories need documentation.

              ## рџљЂ Next Steps

              1. Review missing directories in snapshot
              2. Add appropriate *CONTEXT*.md files
              3. Run coverage verification locally
              4. Commit documentation improvements

              ---
              *This issue was automatically created by the KILO-FOOLISH Coverage Verification workflow.*
              `,
              labels: ['documentation', 'automation', 'coverage-alert']
            });

      - name: рџ“Љ Update Coverage Badge
        if: always()
        run: |
          COVERAGE="${{ steps.snapshot.outputs.coverage }}"

          # Determine badge color
          if (( $(echo "$COVERAGE >= 95" | bc -l) )); then
            COLOR="brightgreen"
          elif (( $(echo "$COVERAGE >= 90" | bc -l) )); then
            COLOR="yellow"
          else
            COLOR="red"
          fi

          # Create badge URL
          BADGE_URL="https://img.shields.io/badge/Documentation%20Coverage-${COVERAGE}%25-${COLOR}"

          echo "Badge URL: $BADGE_URL"

          # Update README or other files with badge if needed
          # This could be extended to automatically update documentation

      - name: рџ“¤ Upload Coverage Artifacts
        uses: actions/upload-artifact@v3
        with:
          name: coverage-snapshot-${{ github.run_number }}
          path: |
            .snapshots/directory_coverage_snapshot_*.json
            .snapshots/maintenance_report_*.json
            coverage_report.md
          retention-days: 30
