# Modern Observability Stack for NuSyQ-Hub
# OpenTelemetry Collector + Jaeger for distributed tracing
# Using Compose Specification (no version field required)

services:
  otel-collector:
    image: otel/opentelemetry-collector:0.104.0
    container_name: nusyq-otel-collector
    command: ["--config=/etc/otelcol/config.yaml"]
    volumes:
      - type: bind
        source: ../../config/otel-collector.yaml
        target: /etc/otelcol/config.yaml
        read_only: true
    ports:
      - "4317:4317"   # OTLP gRPC
      - "4318:4318"   # OTLP HTTP
      - "13133:13133" # Health check
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:13133/health/status || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - observability
    profiles:
      - observability
      - full

  jaeger:
    image: jaegertracing/all-in-one:1.57
    container_name: nusyq-jaeger
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
      SPAN_STORAGE_TYPE: memory
      QUERY_BASE_PATH: /jaeger
    ports:
      - "16686:16686" # UI
      - "14250:14250" # Model proto
      - "14268:14268" # Jaeger thrift
      - "6831:6831/udp" # Jaeger compact thrift
      - "6832:6832/udp" # Jaeger binary thrift
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:14269/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - observability
    profiles:
      - observability
      - full

networks:
  observability:
    name: nusyq-observability
    driver: bridge

# Usage (Docker Compose V2):
#   docker compose -f dev/observability/docker-compose.observability.yml up -d
#   docker compose -f dev/observability/docker-compose.observability.yml --profile observability up
#
# Access Jaeger UI: http://localhost:16686
# OTLP endpoint: localhost:4317 (gRPC) or localhost:4318 (HTTP)
