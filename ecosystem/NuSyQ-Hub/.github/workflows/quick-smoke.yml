name: Quick Smoke Tests

on:
  push:
  pull_request:
    paths:
      - 'src/**'
      - 'tests/**'

jobs:
  quick-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'
      - name: Set up Node.js (for strict hook runtime validation)
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python scripts/generate_ci_requirements.py
          pip install -r requirements.ci.txt || true
          pip install pytest-asyncio pytest-benchmark
      - name: Run import (py_compile) smoke tests
        run: |
          python -m pytest -q tests/import_smoke
      - name: Factory autopilot CI gate (strict hooks)
        run: |
          python nq factory ci-gate --json
