name: Friendly diagnostics (non-blocking)

on:
  push:
    branches: [ '**' ]
  pull_request:
    branches: [ '**' ]

jobs:
  friendly-diagnostics:
    name: Friendly diagnostics (quick, non-blocking)
    runs-on: ubuntu-latest
    permissions: read-all
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Checkout the PR head when available so helper scripts and tests in the branch are present.
          # For push events this falls back to the pushed ref. Use full fetch so tests/scripts are available.
          ref: ${{ github.event_name == 'pull_request' && github.head_ref || github.ref }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Install minimal test deps
        run: |
          python -m pip install --upgrade pip
          pip install pytest==8.4.2

      - name: Run friendly diagnostics (quick mode)
        # Non-blocking helper to provide quick diagnostics on PRs and pushes.
        # If the repository checkout does not contain the helper runner, run a robust inline import-smoke
        # (py_compile) across `src/` so we can surface syntax issues without relying on tests that may not exist.
        run: |
          if [ -f scripts/friendly_test_runner.py ]; then
            echo "Found scripts/friendly_test_runner.py — running it"
            python scripts/friendly_test_runner.py --quick || true
          else
            echo "friendly_test_runner.py not found in checkout — running inline import-smoke fallback"
            # Use the stdlib compileall module to compile all .py files under src/ quickly.
            # This is robust and does not rely on tests being present in the checkout.
            python -m compileall -q src || true
          fi || true
