name: Auto-Fix Import Errors

on:
  workflow_run:
    # Updated: was "Python Tests" (non-existent); now points to actual CI workflow
    workflows: ["Autonomy Gates - CI/CD Enforcement"]
    types:
      - completed

jobs:
  auto-fix-imports:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'failure' }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Download test logs
        uses: actions/download-artifact@v4
        with:
          name: test-logs
          run-id: ${{ github.event.workflow_run.id }}
        continue-on-error: true

      - name: Analyze import errors and suggest fixes
        run: |
          echo "🔍 Analyzing test failures for import errors..."

          # Extract import errors from test output
          if [ -f test-output.log ]; then
            grep -E "(ModuleNotFoundError|ImportError|cannot import name)" test-output.log > import-errors.txt || true

            if [ -s import-errors.txt ]; then
              echo "📝 Found import errors:"
              cat import-errors.txt

              echo ""
              echo "🔧 Generating auto-fix suggestions..."

              # Run auto-fix for each error
              while IFS= read -r error_line; do
                python scripts/auto_fix_imports.py "$error_line" >> auto-fix-suggestions.txt
              done < import-errors.txt

              echo "💡 Auto-fix suggestions:"
              cat auto-fix-suggestions.txt
            else
              echo "✅ No import errors found"
            fi
          else
            echo "⚠️ Test output log not found"
          fi

      - name: Create issue with fix suggestions
        if: hashFiles('auto-fix-suggestions.txt') != ''
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const suggestions = fs.readFileSync('auto-fix-suggestions.txt', 'utf8');

            const body = `## 🔧 Auto-Fix Import Error Suggestions

            The CI pipeline detected import errors. Here are automated fix suggestions:

            \`\`\`
            ${suggestions}
            \`\`\`

            ### How to apply

            1. Review the suggested stub implementations above
            2. Copy the relevant code to the indicated files
            3. Test locally: \`pytest tests/\`
            4. Commit if tests pass

            Or use the auto-fix tool directly:
            \`\`\`bash
            python scripts/auto_fix_imports.py "<error message>"
            \`\`\`

            ---
            *Auto-generated by auto-fix-imports workflow*`;

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '🔧 Auto-Fix Suggestions for Import Errors',
              body: body,
              labels: ['auto-fix', 'import-error', 'enhancement']
            });
