name: Enhanced CI Pipeline

on:
  push:
    branches: [master, main, develop, feature/**]
  pull_request:
    branches: [master, main]
  schedule:
    - cron: '0 0 * * *'  # Daily at midnight

jobs:
  code-quality:
    name: Code Quality Checks
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ['3.11', '3.12']

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Install dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          pip install ruff mypy black pytest pytest-cov pytest-asyncio
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Ruff Linting
        run: |
          ruff check src/ --output-format=github
        continue-on-error: false

      - name: Black Formatting Check
        run: |
          black src/ --check --diff --line-length=100

      - name: Type Checking with mypy
        run: |
          mypy src/guild/ --no-error-summary
        continue-on-error: true

      - name: Validate Action Contracts
        run: |
          python scripts/start_nusyq.py validate_contracts --probe --json > action_contracts_validation.json

      - name: Assert main.py help runtime (<2s)
        run: |
          python -c "import subprocess,sys,time;start=time.perf_counter();res=subprocess.run([sys.executable,'src/main.py','--help'],capture_output=True,text=True,timeout=10);elapsed=time.perf_counter()-start;ok=(res.returncode==0 and elapsed<2.0 and '--openclaw-enabled' in res.stdout and '--openclaw-gateway' in res.stdout);print('main.py --help runtime: %.3fs'%elapsed);print('help_runtime_guard=%s'%ok);sys.exit(0 if ok else 1)"

      - name: Assert start_nusyq.py help runtime (<2s)
        run: |
          python -c "import subprocess,sys,time;start=time.perf_counter();res=subprocess.run([sys.executable,'scripts/start_nusyq.py','--help'],capture_output=True,text=True,timeout=10);elapsed=time.perf_counter()-start;ok=(res.returncode==0 and elapsed<2.0 and 'Usage: python start_nusyq.py' in res.stdout);print('start_nusyq.py --help runtime: %.3fs'%elapsed);print('help_runtime_guard=%s'%ok);sys.exit(0 if ok else 1)"

      - name: Run Tests
        run: |
          pytest -q -k "not e2e and not llm_testing" --cov=src --cov-report=xml
        env:
          PYTHONUTF8: '1'
          PYTHONPATH: ${{ github.workspace }}

      - name: Upload coverage
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.12'
        uses: codecov/codecov-action@v3
        with:
          file: ./coverage.xml
          flags: unittests
          name: codecov-${{ matrix.os }}-py${{ matrix.python-version }}

      - name: Upload action contracts validation
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: action-contracts-validation-${{ matrix.os }}-py${{ matrix.python-version }}
          path: action_contracts_validation.json

  security-scan:
    name: Security Scanning
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install safety bandit pip-audit

      - name: Safety check
        run: |
          safety check --json || true

      - name: Bandit security check
        run: |
          bandit -r src/ -f json -o bandit-report.json || true

      - name: Pip audit
        run: |
          pip-audit --format json || true

      - name: Upload security reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-reports
          path: |
            bandit-report.json
            safety-report.json

  dependency-check:
    name: Dependency Analysis
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Check requirements.txt
        run: |
          if [ ! -f requirements.txt ]; then
            echo "::error::requirements.txt not found"
            exit 1
          fi

          # Check for pinned versions
          if grep -q "==" requirements.txt; then
            echo "✓ Found pinned dependencies"
          else
            echo "::warning::No pinned dependencies found - consider pinning versions"
          fi

      - name: Dependency tree
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install and analyze
        run: |
          pip install pipdeptree
          pip install -r requirements.txt
          pipdeptree --warn silence > dependency-tree.txt

      - name: Upload dependency tree
        uses: actions/upload-artifact@v4
        with:
          name: dependency-tree
          path: dependency-tree.txt

  system-validation:
    name: System Validation
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Guild Board Validation
        run: |
          python scripts/start_nusyq.py guild_status || echo "Guild status check completed with warnings"

      - name: Self-check
        run: |
          python scripts/start_nusyq.py selfcheck || echo "Self-check completed with warnings"

      - name: Generate system state
        run: |
          python scripts/start_nusyq.py || echo "System state generation completed"

      - name: Upload validation reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: validation-reports
          path: state/reports/

  performance-benchmark:
    name: Performance Benchmarks
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main')

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest-benchmark

      - name: Run benchmarks
        run: |
          pytest tests/ -k benchmark --benchmark-only --benchmark-json=benchmark.json || true

      - name: Store benchmark results
        uses: benchmark-action/github-action-benchmark@v1
        if: github.event_name == 'push'
        with:
          tool: 'pytest'
          output-file-path: benchmark.json
          github-token: ${{ secrets.GITHUB_TOKEN }}
          auto-push: true
