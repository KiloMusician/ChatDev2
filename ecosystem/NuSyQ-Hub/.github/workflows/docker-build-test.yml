name: Docker Build & Test

on:
  push:
    branches: [master, main, develop]
  pull_request:
    branches: [master, main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  docker-lint:
    name: Dockerfile Linting
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Hadolint
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: Dockerfile
          failure-threshold: error

      - name: Lint Dockerfile.dev
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: Dockerfile.dev
          failure-threshold: error

      - name: Lint Dockerfile.prod
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: Dockerfile.prod
          failure-threshold: error

  build-and-test:
    name: Build & Test Docker Images
    runs-on: ubuntu-latest
    strategy:
      matrix:
        dockerfile: [Dockerfile, Dockerfile.dev, Dockerfile.prod]
        include:
          - dockerfile: Dockerfile
            tag-suffix: latest
          - dockerfile: Dockerfile.dev
            tag-suffix: dev
          - dockerfile: Dockerfile.prod
            tag-suffix: prod

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: |
            image=moby/buildkit:v0.17.0
            network=host

      - name: Log in to Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch,suffix=-${{ matrix.tag-suffix }}
            type=ref,event=pr,suffix=-${{ matrix.tag-suffix }}
            type=semver,pattern={{version}},suffix=-${{ matrix.tag-suffix }}
            type=sha,suffix=-${{ matrix.tag-suffix }}

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: false
          load: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            INSTALL_ALEMBIC=yes

      - name: Test image
        run: |
          IMAGE_TAG=$(echo "${{ steps.meta.outputs.tags }}" | head -n1)
          echo "Testing image: $IMAGE_TAG"

          # Start container
          docker run -d --name test-container \
            -e PYTHONPATH=/app \
            -e ENVIRONMENT=test \
            $IMAGE_TAG sleep 300

          # Wait for container to be ready
          sleep 5

          # Test Python environment
          docker exec test-container python --version
          docker exec test-container pip list

          # Test application imports
          docker exec test-container python -c "import src; print('Import successful')"

          # Test directory structure
          docker exec test-container ls -la /app

          # Stop container
          docker stop test-container
          docker rm test-container

      - name: Scan for vulnerabilities
        uses: aquasecurity/trivy-action@v0.29.0
        with:
          image-ref: ${{ steps.meta.outputs.tags }}
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'

      - name: Upload Trivy results to GitHub Security
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-results.sarif'

      - name: Push image
        if: github.event_name != 'pull_request'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  integration-test:
    name: Docker Compose Integration
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Create test environment file
        run: |
          cat > .env.test <<EOF
          ENVIRONMENT=test
          PYTHONPATH=/app
          OLLAMA_BASE_URL=http://ollama-mock:8080
          CHATDEV_PATH=/app/external/chatdev
          EOF

      - name: Build services
        run: |
          docker compose -f deploy/docker-compose.dev.yml build

      - name: Start services
        run: |
          docker compose -f deploy/docker-compose.dev.yml --profile full up -d

      - name: Wait for services
        run: |
          echo "Waiting for services to be healthy..."
          for i in {1..30}; do
            if docker compose -f deploy/docker-compose.dev.yml ps | grep -q "Up (healthy)"; then
              echo "Services are healthy"
              break
            fi
            echo "Waiting... ($i/30)"
            sleep 5
          done

      - name: Test endpoints
        run: |
          # Test ollama-mock
          curl -f http://localhost:8080/health || exit 1

          # Test main application (if exposed)
          curl -f http://localhost:5000/ || echo "Main app endpoint not exposed or not ready"

      - name: Check logs
        if: always()
        run: |
          echo "=== Service Logs ==="
          docker compose -f deploy/docker-compose.dev.yml logs

      - name: Tear down
        if: always()
        run: |
          docker compose -f deploy/docker-compose.dev.yml --profile full down --volumes

  multi-arch-build:
    name: Multi-Architecture Build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push multi-arch image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.prod
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
