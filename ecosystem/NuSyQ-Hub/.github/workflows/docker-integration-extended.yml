name: Docker Compose Integration Extended

on:
  pull_request:
  workflow_dispatch:

jobs:
  compose-extended-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
      - name: Build images (with alembic)
        run: |
          docker build --progress=plain --build-arg INSTALL_ALEMBIC=yes -f Dockerfile -t nusyq-hub:ci . || true
          docker build -f deploy/ollama_mock/Dockerfile -t nusyq-ollama-mock:ci deploy/ollama_mock || true
      - name: Start compose (full)
        run: |
          docker compose -f deploy/docker-compose.dev.yml --profile full up -d
      - name: Wait for ollama-mock health
        run: |
          for i in {1..30}; do
            if curl -sSf http://localhost:8080/health >/dev/null 2>&1; then echo 'ollama-mock up'; break; fi
            echo 'waiting for ollama-mock...'; sleep 2
          done
      - name: Test SSE endpoint (simple)
        run: |
          # Request SSE and capture first event
          timeout 10 bash -c "curl -sS -N http://localhost:8080/v1/generate_sse -H 'Content-Type: application/json' -d '{\"prompt\":\"Hello SSE\"}' | head -n 1"
      - name: Smoke test app port
        run: |
          curl -sSf http://localhost:5000/ || true
      - name: Tear down
        run: |
          docker compose -f deploy/docker-compose.dev.yml --profile full down --volumes
