name: Docker Compose Integration Smoke Test

on:
  push:
    branches: [ master ]
  pull_request:

jobs:
  compose-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
      - name: Build images
        run: |
          docker compose -f deploy/docker-compose.dev.yml build nusyq-hub ollama-mock || true
      - name: Start compose (minimal + full profile)
        run: |
          docker compose -f deploy/docker-compose.dev.yml --profile full up -d
      - name: Wait for services
        run: |
          # Wait for ollama-mock health
          for i in {1..20}; do
            if curl -sSf http://localhost:8080/health >/dev/null 2>&1; then echo 'ollama-mock up'; break; fi
            echo 'waiting for ollama-mock...'; sleep 2
          done
      - name: Smoke test endpoints
        run: |
          curl -sSf http://localhost:8080/health
          echo
          curl -sSf http://localhost:5000/ || true
      - name: Tear down
        run: |
          docker compose -f deploy/docker-compose.dev.yml --profile full down --volumes
