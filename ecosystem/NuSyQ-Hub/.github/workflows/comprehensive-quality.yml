name: Comprehensive Quality Checks

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]
  schedule:
    - cron: '0 0 * * 0'  # Weekly on Sunday

jobs:
  quality-checks:
    name: Code Quality & Testing
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.12']

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for better analysis

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt || pip install pytest pytest-cov ruff mypy bandit

      - name: Run Ruff (Fast Linter)
        run: |
          ruff check src/ --output-format=github
        continue-on-error: true

      - name: Run Ruff Format Check
        run: |
          ruff format --check src/
        continue-on-error: true

      - name: Type Checking with MyPy
        run: |
          mypy src/ --ignore-missing-imports --show-error-codes || true
        continue-on-error: true

      - name: Security Scan with Bandit
        run: |
          bandit -r src/ -f json -o bandit-report.json || true
          cat bandit-report.json
        continue-on-error: true

      - name: Run Test Suite
        run: |
          pytest tests/ -v --tb=short --cov=src --cov-report=xml --cov-report=term
        env:
          PYTHONPATH: .

      - name: Upload Coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          flags: unittests
          name: codecov-umbrella
        continue-on-error: true

      - name: Generate Test Report
        if: always()
        run: |
          pytest tests/ --tb=short --junit-xml=test-results.xml || true

      - name: Publish Test Results
        uses: EnricoMi/publish-unit-test-result-action@v2
        if: always()
        with:
          files: test-results.xml
        continue-on-error: true

      - name: Check for TODOs
        run: |
          echo "## TODO Comments Found" >> $GITHUB_STEP_SUMMARY
          grep -rn "TODO\|FIXME\|XXX\|HACK" src/ || echo "No TODOs found" >> $GITHUB_STEP_SUMMARY
        continue-on-error: true

      - name: Syntax Validation
        run: |
          python -m compileall src/ -q

      - name: Import Smoke Test
        run: |
          python -c "import sys; sys.path.insert(0, '.'); from src.integration.unified_ai_context_manager import get_unified_context_manager; print('✅ Imports working')"

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: quality-checks

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Run Integration Tests
        run: |
          pytest tests/integration/ -v --tb=short -m "not slow"
        env:
          PYTHONPATH: .

  performance-tests:
    name: Performance Benchmarks
    runs-on: ubuntu-latest
    needs: quality-checks

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-benchmark

      - name: Run Benchmarks
        run: |
          pytest tests/benchmarks/ -v --benchmark-only --benchmark-json=benchmark-results.json || true
        continue-on-error: true

      - name: Store Benchmark Results
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: benchmark-results.json
        continue-on-error: true
