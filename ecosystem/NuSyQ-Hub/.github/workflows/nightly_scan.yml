name: Nightly Tech-debt Scan

on:
  schedule:
    - cron: '0 2 * * *' # daily at 02:00 UTC
  workflow_dispatch: {}

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt || true
      - name: Run maze scanner
        run: |
          python -m src.tools.maze_solver . --max-depth 12
      - name: Upload summaries
        uses: actions/upload-artifact@v4
        with:
          name: maze_summaries
          path: logs/maze_summary_*.json
