name: Docker Compose Validate

on:
  push:
  pull_request:

jobs:
  validate-compose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      # Use .env.example so required vars (POSTGRES_PASSWORD, REDIS_PASSWORD,
      # GRAFANA_PASSWORD) are populated during validation — no secrets needed.
      - name: Validate docker-compose.yml (production root)
        run: |
          docker compose \
            -f docker-compose.yml \
            --env-file .env.example \
            config --quiet

      - name: Validate deploy/docker-compose.dev.yml
        run: |
          docker compose \
            -f deploy/docker-compose.dev.yml \
            --env-file deploy/.env.example \
            config --quiet

      - name: Validate deploy/docker-compose.full-stack.yml
        run: |
          docker compose \
            -f deploy/docker-compose.full-stack.yml \
            --env-file deploy/.env.example \
            config --quiet

      - name: Validate deploy/docker-compose.agents.yml (if present)
        run: |
          if [ -f deploy/docker-compose.agents.yml ]; then
            docker compose \
              -f deploy/docker-compose.agents.yml \
              --env-file deploy/.env.example \
              config --quiet
          else
            echo "deploy/docker-compose.agents.yml not found — skipping"
          fi
