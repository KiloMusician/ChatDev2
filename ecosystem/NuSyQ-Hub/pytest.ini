[pytest]
# NuSyQ-Hub pytest configuration (consolidated)

# Python path - ensure project root is available for imports
pythonpath = .

# Test discovery patterns
python_files = test_*.py *_test.py
python_classes = Test*
python_functions = test_*

# Test directories
testpaths = tests

# Coverage configuration
# Coverage temporarily lowered from 70 to 30 to unblock test execution
# Parallel execution (-n auto) disabled due to Windows capture FileNotFoundError
addopts =
    --cov
    --cov-config=.coveragerc
    --cov-report=term-missing
    --cov-report=html:htmlcov
    --cov-report=xml
    --cov-fail-under=33
    --capture=no
    -v
    --strict-markers
    --tb=short
    --maxfail=3

# Markers for test categorization (consolidated list)
markers =
    unit: unit tests
    integration: integration tests
    e2e: end-to-end tests
    slow: slow running tests
    smoke: smoke tests
    ai_backend: tests requiring AI backends
    consciousness: tests for consciousness modules
    no_cov: exclude from coverage
    capture_sensitive: capture sensitive output
    critical_path: critical path tests
    ai_backend_required: requires live AI backends
    stable: stable tests
    flaky: known flaky tests
    performance: performance benchmarks
    chatdev: marks tests requiring ChatDev integration
    ollama: marks tests requiring Ollama models
    simulatedverse: marks tests requiring SimulatedVerse bridge
    quantum: marks tests for quantum healing systems
    ollama_optional: marks tests that work with or without Ollama service
    asyncio: marks tests using asyncio (Windows-safe handling)
    requires_external_service: marks tests requiring external services (network-dependent)
    ml_heavy: marks tests depending on heavy ML deps
    timeout: per-test timeout marker

# Ignore patterns
norecursedirs =
    .git
    .venv
    venv
    __pycache__
    *.egg-info
    build
    dist
    web/static
    web/templates

# Warnings
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
    ignore::FutureWarning

# Logging
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)s] %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

# Asyncio configuration for Windows compatibility
asyncio_mode = auto

# Minimum pytest version
minversion = 7.0

# pythonpath set at top of file (= .)
