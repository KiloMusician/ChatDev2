services:
  # Main NuSyQ-Hub application
  nusyq-hub:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        INSTALL_ALEMBIC: yes
      cache_from:
        - ${REGISTRY:-ghcr.io}/${IMAGE_NAME:-nusyq-hub}:latest
    image: ${REGISTRY:-ghcr.io}/${IMAGE_NAME:-nusyq-hub}:${TAG:-latest}
    container_name: nusyq-hub-app
    restart: unless-stopped
    ports:
      - "${APP_PORT:-5000}:5000"
    environment:
      - PYTHONUNBUFFERED=1
      - PYTHONPATH=/app
      - ENVIRONMENT=${ENVIRONMENT:-production}
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-http://ollama:11434}
      - CHATDEV_PATH=${CHATDEV_PATH:-/app/external/chatdev}
    volumes:
      - ./logs:/app/logs
      - ./data:/app/data
      - ./config:/app/config:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - nusyq-network
    depends_on:
      ollama:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '1'
          memory: 1G

  # Development variant with hot-reload
  nusyq-hub-dev:
    build:
      context: .
      dockerfile: Dockerfile.dev
    image: nusyq-hub:dev
    container_name: nusyq-hub-dev
    restart: unless-stopped
    ports:
      - "${DEV_APP_PORT:-5001}:5000"
      - "${DEBUG_PORT:-5678}:5678"
    environment:
      - PYTHONUNBUFFERED=1
      - PYTHONPATH=/app
      - ENVIRONMENT=development
      - DEBUG=1
      - OLLAMA_BASE_URL=http://ollama:11434
    volumes:
      - .:/app
      - /app/.venv
      - /app/__pycache__
    networks:
      - nusyq-network
    depends_on:
      - ollama
    profiles:
      - dev

  # Ollama service for local LLM
  ollama:
    image: ollama/ollama:0.4.7
    container_name: nusyq-ollama
    restart: unless-stopped
    ports:
      - "${OLLAMA_PORT:-11434}:11434"
    volumes:
      - ollama-data:/root/.ollama
    environment:
      - OLLAMA_HOST=0.0.0.0:11434
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/version"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - nusyq-network
    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 8G
        reservations:
          cpus: '2'
          memory: 4G

  # Mock Ollama for testing (lighter weight)
  ollama-mock:
    build:
      context: ./testing
      dockerfile: Dockerfile.mock-ollama
    image: nusyq-hub:mock-ollama
    container_name: nusyq-ollama-mock
    restart: unless-stopped
    ports:
      - "${MOCK_OLLAMA_PORT:-8080}:8080"
    environment:
      - MOCK_MODE=true
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - nusyq-network
    profiles:
      - test
      - full

  # Redis for caching and task queue
  redis:
    image: redis:7.4.2-alpine
    container_name: nusyq-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD}"]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "$$REDIS_PASSWORD", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - nusyq-network
    profiles:
      - full

  # PostgreSQL for persistent storage
  # Note: pinned to 15.8-alpine to match deploy/k8s/postgres.yaml
  # Upgrading to 16 requires a data migration — coordinate with K8s manifests
  postgres:
    image: postgres:15.8-alpine
    container_name: nusyq-postgres
    restart: unless-stopped
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-nusyq}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB:-nusyq}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-nusyq}"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - nusyq-network
    profiles:
      - full

  # Nginx reverse proxy
  nginx:
    image: nginx:1.27-alpine
    container_name: nusyq-nginx
    restart: unless-stopped
    ports:
      - "${NGINX_HTTP_PORT:-80}:80"
      - "${NGINX_HTTPS_PORT:-443}:443"
    volumes:
      - ./deploy/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./deploy/nginx/ssl:/etc/nginx/ssl:ro
    networks:
      - nusyq-network
    depends_on:
      - nusyq-hub
    profiles:
      - full

  # Prometheus for metrics
  prometheus:
    image: prom/prometheus:v2.53.0
    container_name: nusyq-prometheus
    restart: unless-stopped
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    volumes:
      - ./deploy/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    networks:
      - nusyq-network
    profiles:
      - monitoring

  # Grafana for visualization
  grafana:
    image: grafana/grafana:11.1.0
    container_name: nusyq-grafana
    restart: unless-stopped
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD}
      - GF_INSTALL_PLUGINS=
    volumes:
      - grafana-data:/var/lib/grafana
      - ./deploy/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./deploy/grafana/datasources:/etc/grafana/provisioning/datasources:ro
    networks:
      - nusyq-network
    depends_on:
      - prometheus
    profiles:
      - monitoring

volumes:
  ollama-data:
    driver: local
  redis-data:
    driver: local
  postgres-data:
    driver: local
  prometheus-data:
    driver: local
  grafana-data:
    driver: local

networks:
  nusyq-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16
