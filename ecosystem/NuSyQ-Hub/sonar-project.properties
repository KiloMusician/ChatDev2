# SonarQube/SonarLint Project Configuration
# NuSyQ-Hub Multi-Repository Ecosystem

sonar.projectKey=nusyq-hub
sonar.projectName=NuSyQ-Hub
sonar.projectVersion=1.0
sonar.sourceEncoding=UTF-8

# Source and test directories
sonar.sources=src,scripts,config
sonar.tests=tests
sonar.test.inclusions=tests/**
sonar.test.exclusions=

# Exclude standard library, virtual environments, third-party code, and configuration files
sonar.exclusions=\
  **/.venv/**,\
  **/venv/**,\
  **/ChatDev/**,\
  **/node_modules/**,\
  **/.git/**,\
  **/__pycache__/**,\
  **/build/**,\
  **/dist/**,\
  **/*.egg-info/**,\
  **/AppData/Local/Programs/Python/**,\
  **/AppData/Roaming/Python/**,\
  **/.pyenv/**,\
  **/.venv/lib/python*/**,\
  **/Lib/python*/**,\
  **/lib/python*/**,\
  **/site-packages/**,\
  **/dist-packages/**,\
  **/archive/**,\
  docs/Notebooks/**,\
  notebooks/**,\
  **/knowledge-base.yaml,\
  **/*.manifest.yaml,\
  **/*.jsonl,\
  **/quest_log.jsonl,\
  **/*.db,\
  **/*.sqlite,\
  **/.env,\
  **/.env.*

# Python-specific settings
sonar.python.version=3.13
sonar.python.coverage.reportPaths=coverage.xml

# General code quality
sonar.issues.max=10000
sonar.duplications.skip=false
