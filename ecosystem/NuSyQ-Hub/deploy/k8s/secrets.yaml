---
# IMPORTANT: This is a TEMPLATE file for secrets
# DO NOT commit actual secrets to version control
# WARNING: All values below are EMPTY PLACEHOLDERS.
#          Fill them in locally; never commit real secrets.
#
# Create actual secrets using kubectl:
#   kubectl create secret generic nusyq-hub-secrets \
#     --namespace nusyq-hub \
#     --from-literal=POSTGRES_PASSWORD=$(openssl rand -base64 32) \
#     --from-literal=SECRET_KEY=$(python -c "import secrets; print(secrets.token_hex(32))") \
#     --from-literal=JWT_SECRET=$(python -c "import secrets; print(secrets.token_hex(32))")

apiVersion: v1
kind: Secret
metadata:
  name: nusyq-hub-secrets
  namespace: nusyq-hub
  labels:
    app: nusyq-hub
type: Opaque
stringData:
  # Database credentials — fill in before applying
  POSTGRES_USER: "nusyq"
  POSTGRES_PASSWORD: ""
  DATABASE_URL: ""

  # API keys (replace with actual values)
  OPENAI_API_KEY: ""
  ANTHROPIC_API_KEY: ""
  GOOGLE_API_KEY: ""

  # Redis password (required if Redis auth is enabled)
  REDIS_PASSWORD: ""

  # GitHub token for CI/CD integration
  GITHUB_TOKEN: ""

  # Encryption keys — MUST be randomly generated
  # python -c "import secrets; print(secrets.token_hex(32))"
  SECRET_KEY: ""
  JWT_SECRET: ""

---
# Instructions for generating secrets securely:
#
# 1. Generate random keys:
#    python -c "import secrets; print(secrets.token_hex(32))"
#
# 2. Create secrets from literals:
#    kubectl create secret generic nusyq-hub-secrets \
#      --from-literal=POSTGRES_PASSWORD=$(openssl rand -base64 32) \
#      --from-literal=SECRET_KEY=$(python -c "import secrets; print(secrets.token_hex(32))") \
#      --namespace=nusyq-hub
#
# 3. Use sealed-secrets for GitOps:
#    https://github.com/bitnami-labs/sealed-secrets
