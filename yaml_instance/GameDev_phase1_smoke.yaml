graph:
  id: pygame_game_phase1_smoke
  description: Minimal bounded GameDev smoke that proves local game generation and file emission without the full polish and execution loop.
  log_level: INFO
  is_majority_voting: false
  nodes:
    - id: Phase1_Game_Developer
      type: agent
      context_window: 0
      config:
        provider: openai
        name: ecosystem-coder-fast
        base_url: ${BASE_URL}
        api_key: ${API_KEY}
        role: |-
          Write one small runnable pygame game in `game.py`.

          Requirements:
          - one file only
          - no external assets
          - visible non-black background
          - 60 FPS with `pygame.time.Clock()`
          - clean `pygame.QUIT` handling with `pygame.quit()` and `sys.exit()`
          - restart on `R`
          - simple shapes and one tiny core mechanic

          After writing the full code, call:
          `save_file(path="game.py", content="<full code>")`

          Then output exactly:
          `Phase 1 smoke complete. Code saved to game.py.`

          Put code only inside the tool call.
        tooling:
          - type: function
            config:
              auto_load: true
              tools:
                - name: save_file
  initial_instruction: Describe a tiny game concept to generate as a single-file local smoke artifact.
  start:
    - Phase1_Game_Developer
  end:
    - Phase1_Game_Developer
version: 1.0.0
vars: {}
